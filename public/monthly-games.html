<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Monthly Games — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .mg-wrap { max-width: 540px; margin: 0 auto; padding: 0 0 40px; }

    .mg-banner {
      background: var(--orange); padding: 10px 24px;
      text-align: center; font-size: 11px; font-weight: 800;
      letter-spacing: 3px; color: #fff;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .mg-card {
      background: linear-gradient(160deg, #1c1c1c 0%, #111 100%);
      border: 2px solid var(--orange); border-top: none;
      border-radius: 0 0 20px 20px; padding: 32px 24px;
    }
    .mg-logo-wrap { text-align: center; margin-bottom: 20px; }
    .mg-logo-circle {
      width: 88px; height: 88px; border-radius: 50%;
      border: 3px solid var(--orange); background: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 38px; box-shadow: 0 0 30px rgba(255,92,0,.25);
    }
    .mg-title { font-family: var(--font-display); font-size: 2.4rem; color: var(--white); text-align: center; line-height: 1.1; margin-bottom: 6px; }
    .mg-edition { color: var(--orange); font-size: 11px; font-weight: 800; letter-spacing: 2px; text-align: center; margin-bottom: 4px; }
    .mg-tagline { color: var(--text-dim); font-size: 13px; font-style: italic; text-align: center; margin-bottom: 28px; }

    /* ── Progress tracker ─────────────────────────────────────────── */
    .mg-progress {
      border-radius: 14px; padding: 20px; margin-bottom: 20px;
      border: 2px solid;
    }
    .mg-progress.upcoming  { border-color: var(--border); background: rgba(255,255,255,.02); }
    .mg-progress.in_progress { border-color: var(--orange); background: rgba(255,92,0,.04); }
    .mg-progress.won       { border-color: #22c55e; background: rgba(34,197,94,.05); }
    .mg-progress.failed    { border-color: #ef4444; background: rgba(239,68,68,.04); }
    .mg-progress.ended     { border-color: var(--border); background: rgba(255,255,255,.02); }

    .mg-progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .mg-progress-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; }
    .mg-progress.upcoming   .mg-progress-label { color: var(--text-dim); }
    .mg-progress.in_progress .mg-progress-label { color: var(--orange); }
    .mg-progress.won         .mg-progress-label { color: #22c55e; }
    .mg-progress.failed      .mg-progress-label { color: #ef4444; }
    .mg-progress.ended       .mg-progress-label { color: var(--text-dim); }

    .mg-progress-icon { font-size: 22px; }

    .mg-session-dots { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .mg-dot {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; border: 2px solid;
    }
    .mg-dot.done    { background: rgba(34,197,94,.15); border-color: #22c55e; }
    .mg-dot.pending { background: rgba(255,92,0,.08);  border-color: rgba(255,92,0,.3); }
    .mg-dot.missed  { background: rgba(239,68,68,.12); border-color: #ef4444; }

    .mg-progress-bar-wrap { height: 6px; background: var(--muted); border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
    .mg-progress-bar { height: 100%; border-radius: 3px; transition: width .5s; }
    .mg-progress.in_progress .mg-progress-bar { background: var(--orange); }
    .mg-progress.won         .mg-progress-bar { background: #22c55e; }
    .mg-progress.failed      .mg-progress-bar { background: #ef4444; }

    .mg-progress-stats { display: flex; gap: 20px; font-size: 13px; }
    .mg-stat { display: flex; flex-direction: column; gap: 2px; }
    .mg-stat-val { font-weight: 700; color: var(--white); font-size: 15px; }
    .mg-stat-lbl { color: var(--text-dim); font-size: 11px; }

    .mg-progress-msg { font-size: 13px; margin-top: 12px; line-height: 1.5; }
    .mg-progress.in_progress .mg-progress-msg { color: var(--orange); }
    .mg-progress.won         .mg-progress-msg { color: #22c55e; }
    .mg-progress.failed      .mg-progress-msg { color: #ef4444; }
    .mg-progress.upcoming    .mg-progress-msg { color: var(--text-dim); }
    .mg-progress.ended       .mg-progress-msg { color: var(--text-dim); }

    /* ── Challenge box ─────────────────────────────────────────────── */
    .mg-challenge { border: 1px solid var(--orange); border-radius: 14px; padding: 24px 20px 20px; margin-bottom: 20px; background: rgba(255,92,0,.03); }
    .mg-challenge-label { text-align: center; font-size: 10px; font-weight: 800; letter-spacing: 2.5px; color: var(--orange); margin-bottom: 14px; }
    .mg-challenge-title { font-family: var(--font-display); font-size: 1.35rem; color: var(--white); text-align: center; margin-bottom: 8px; }
    .mg-dates { font-family: var(--font-display); font-size: 1.5rem; color: var(--white); text-align: center; margin-bottom: 8px; }
    .mg-dates-sep { color: var(--orange); }
    .mg-challenge-desc { color: var(--text-dim); font-size: 13px; text-align: center; margin-bottom: 20px; line-height: 1.5; }

    .mg-rewards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mg-reward { background: rgba(255,92,0,.06); border: 1px solid rgba(255,92,0,.2); border-radius: 10px; padding: 16px 12px; text-align: center; }
    .mg-reward-val { font-family: var(--font-display); font-size: 1.8rem; color: var(--orange); line-height: 1; margin-bottom: 4px; }
    .mg-reward-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); }
    .mg-reward-note { font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 12px; font-style: italic; }

    .mg-how { margin-top: 24px; }
    .mg-how-title { font-size: 12px; font-weight: 800; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 16px; }
    .mg-step { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-start; }
    .mg-step-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,92,0,.1); border: 1px solid rgba(255,92,0,.3);
      color: var(--orange); font-weight: 800; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .mg-step-text { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
    .mg-step-text strong { color: var(--white); }

    .mg-footer { margin-top: 28px; background: rgba(255,92,0,.06); border: 1px solid rgba(255,92,0,.15); border-radius: 10px; padding: 16px 20px; text-align: center; }
    .mg-footer-title { font-weight: 700; color: var(--white); font-size: 13px; margin-bottom: 4px; }
    .mg-footer-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

    .mg-inactive { text-align: center; padding: 60px 24px; border: 2px dashed var(--border); border-radius: 16px; }
    .mg-inactive-icon { font-size: 48px; margin-bottom: 16px; }
    .mg-inactive-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--white); margin-bottom: 8px; }

    @media (min-width: 900px) { .mg-wrap { padding: 0 24px 40px; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">FIT<span>ANYA</span></a>
    <div id="sidebar-profile"></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><span class="icon">🏠</span>Dashboard</a>
      <a href="/dashboard/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <a href="/dashboard/membership" class="nav-item"><span class="icon">🎫</span>Membership</a>
      <a href="/dashboard/payment" class="nav-item"><span class="icon">💳</span>Pay Now</a>
      <a href="/dashboard/progress" class="nav-item"><span class="icon">📊</span>Progress</a>
      <a href="/dashboard/diet" class="nav-item"><span class="icon">🥗</span>Diet & Nutrition</a>
      <a href="/dashboard/monthly-games" class="nav-item active"><span class="icon">🏆</span>Monthly Games</a>
      <a href="/dashboard/stories" class="nav-item"><span class="icon">📸</span>My Stories</a>
      <a href="/dashboard/referral" class="nav-item"><span class="icon">🎁</span>Refer & Earn</a>
      <a href="/dashboard/profile" class="nav-item"><span class="icon">👤</span>Profile</a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="logout()" style="width:100%"><span class="icon">🚪</span>Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="mg-wrap">
      <div id="page-content"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
  async function init() {
    await requireAuth();
    const data = await api.get('/api/customer/monthly-games');
    const wrap = document.getElementById('page-content');
    const game = data?.game || data?.recentGame;

    if (!game) {
      wrap.innerHTML = `
        <div class="mg-inactive">
          <div class="mg-inactive-icon">🏆</div>
          <div class="mg-inactive-title">No Active Competition</div>
          <p class="text-dim mt-8">Check back soon — Fitanya Monthly Games are coming your way!</p>
          <p class="text-dim text-small mt-16" style="font-style:italic">Every month brings a fresh challenge, new rewards, and surprises. Stay tuned!</p>
        </div>`;
      return;
    }

    const p = data.progress;
    const pct  = game.reward_percent;
    const sess = game.reward_sessions;
    const startFmt = fmtDate(game.start_date);
    const endFmt   = fmtDate(game.end_date);

    wrap.innerHTML = `
      <div class="mg-banner">FITANYA PRESENTS</div>
      <div class="mg-card">
        <div class="mg-logo-wrap"><div class="mg-logo-circle">🏆</div></div>
        <div class="mg-title">${esc(game.title || 'MONTHLY GAMES')}</div>
        <div class="mg-edition">${esc(game.edition||'').toUpperCase()} &bull; ${esc(game.tagline||'').toUpperCase()}</div>
        <div class="mg-tagline">Train. Transform. Transcend.</div>

        ${p ? renderProgress(p, pct, sess) : ''}

        <div class="mg-challenge">
          <div class="mg-challenge-label">THIS MONTH'S CHALLENGE</div>
          <div class="mg-challenge-title">${esc(game.challenge_title)}</div>
          <div class="mg-dates">${startFmt} <span class="mg-dates-sep">—</span> ${endFmt}</div>
          ${game.challenge_desc ? `<div class="mg-challenge-desc">${esc(game.challenge_desc)}</div>` : ''}
          <div class="mg-rewards">
            <div class="mg-reward">
              <div class="mg-reward-val">${pct}% OFF</div>
              <div class="mg-reward-lbl">ON YOUR NEXT RENEWAL</div>
            </div>
            <div class="mg-reward">
              <div class="mg-reward-val">${sess} SESSIONS</div>
              <div class="mg-reward-lbl">ABSOLUTELY FREE</div>
            </div>
          </div>
          <div class="mg-reward-note">Rewards apply to your very next renewal cycle after the challenge.</div>
        </div>

        <div class="mg-how">
          <div class="mg-how-title">HOW IT WORKS</div>
          <div class="mg-step">
            <div class="mg-step-num">01</div>
            <div class="mg-step-text">Book and attend <strong>all your sessions</strong> between <strong>${startFmt} – ${endFmt}</strong>.</div>
          </div>
          <div class="mg-step">
            <div class="mg-step-num">02</div>
            <div class="mg-step-text">Zero cancellations during the challenge period — <strong>consistency is the game.</strong></div>
          </div>
          <div class="mg-step">
            <div class="mg-step-num">03</div>
            <div class="mg-step-text">Complete all sessions → unlock <strong>${pct}% off</strong> your next renewal + <strong>${sess} free sessions</strong>, credited automatically.</div>
          </div>
        </div>

        <div class="mg-footer">
          <div class="mg-footer-title">FITANYA MONTHLY GAMES</div>
          <div class="mg-footer-desc">A brand-new challenge drops every month — fresh games, offers & surprises for our Fitanya family.</div>
        </div>
      </div>`;
  }

  function renderProgress(p, pct, sess) {
    const { totalDays, completedDays, missedDays, daysElapsed,
            completedDates, status, officialWinner } = p;
    const futureDays = Math.max(0, totalDays - daysElapsed);

    const labels = {
      upcoming:    { icon: '📅', text: 'CHALLENGE UPCOMING',  msg: `${totalDays}-day challenge. Complete 1 session every day to win!` },
      in_progress: { icon: '🔥', text: 'YOUR PROGRESS',       msg: missedDays > 0
        ? `You missed ${missedDays} day(s). Keep going — complete remaining days to stay eligible!`
        : `${completedDays}/${totalDays} days done. Keep it up — don't skip a day!` },
      won:         { icon: '🏆', text: 'CHALLENGE COMPLETE!', msg: officialWinner
        ? `🎉 You've officially won! Your ${pct}% off + ${sess} free sessions will be applied to your account.`
        : `🎉 You completed all ${totalDays} days! Results are being reviewed — rewards coming soon.` },
      failed:      { icon: '❌', text: 'CHALLENGE MISSED',    msg: `You missed ${missedDays} day(s) during the challenge. A fresh challenge drops next month — don't miss it!` },
      ended:       { icon: '🏁', text: 'CHALLENGE ENDED',     msg: completedDays === 0 ? 'You had no sessions during this challenge.' : 'Results are being reviewed. Check back soon!' },
    };
    const l = labels[status] || labels.ended;

    // One dot per challenge day.
    // ✓ = completed a session that day (regardless of any cancellations)
    // ✗ = strictly past day (yesterday or earlier) with no completed session
    // ○ = today (still time to complete) or a future day
    const startDt = new Date(p.start_date + 'T00:00:00');
    const completedSet = new Set(completedDates || []);
    const today = new Date().toISOString().split('T')[0];
    let dotsHtml = '';
    for (let i = 0; i < totalDays; i++) {
      const dayDt = new Date(startDt.getTime() + i * 86400000);
      const dayStr = dayDt.toISOString().split('T')[0];
      const isStrictlyPast = dayStr < today; // yesterday or earlier
      if (completedSet.has(dayStr)) {
        dotsHtml += `<div class="mg-dot done" title="${dayStr}">✓</div>`;
      } else if (isStrictlyPast) {
        dotsHtml += `<div class="mg-dot missed" title="${dayStr}">✗</div>`;
      } else {
        dotsHtml += `<div class="mg-dot pending" title="${dayStr}">○</div>`;
      }
    }

    const barPct = totalDays > 0 ? Math.round((completedDays / totalDays) * 100) : 0;

    return `
      <div class="mg-progress ${status}">
        <div class="mg-progress-header">
          <span class="mg-progress-label">${l.text}</span>
          <span class="mg-progress-icon">${l.icon}</span>
        </div>
        <div class="mg-session-dots">${dotsHtml}</div>
        <div class="mg-progress-bar-wrap">
          <div class="mg-progress-bar" style="width:${barPct}%"></div>
        </div>
        <div class="mg-progress-stats">
          <div class="mg-stat"><span class="mg-stat-val">${completedDays}</span><span class="mg-stat-lbl">Days Done</span></div>
          <div class="mg-stat"><span class="mg-stat-val">${totalDays}</span><span class="mg-stat-lbl">Total Days</span></div>
          ${futureDays > 0 ? `<div class="mg-stat"><span class="mg-stat-val">${futureDays}</span><span class="mg-stat-lbl">Days Left</span></div>` : ''}
          ${missedDays > 0 ? `<div class="mg-stat"><span class="mg-stat-val" style="color:#ef4444">${missedDays}</span><span class="mg-stat-lbl">Missed</span></div>` : ''}
        </div>
        <div class="mg-progress-msg">${l.msg}</div>
      </div>`;
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
