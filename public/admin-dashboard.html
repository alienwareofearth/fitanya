<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Admin — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .admin-sidebar { width:240px; }
    .admin-logo { font-size:20px; padding:24px 20px; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/admin" class="sidebar-logo" style="font-size:20px;padding:22px 20px">FIT<span>ANYA</span> <span style="font-size:11px;color:var(--text-dim);font-family:var(--font-ui);display:block;margin-top:2px">ADMIN</span></a>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item active"><span class="icon">📊</span>Dashboard</a>
      <a href="/admin/packages" class="nav-item"><span class="icon">📦</span>Packages & Prices</a>
      <a href="/admin/discounts" class="nav-item"><span class="icon">🏷️</span>Discounts</a>
      <a href="/admin/coaches" class="nav-item"><span class="icon">🏋️</span>Coaches</a>
      <a href="/admin/members" class="nav-item"><span class="icon">👥</span>Members</a>
      <a href="/admin/stories" class="nav-item"><span class="icon">📸</span>Stories</a>
      <a href="/admin/diet" class="nav-item"><span class="icon">🥗</span>Diet Plans</a>
      <a href="/admin/settings" class="nav-item"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header mb-32"><h2>Admin Dashboard</h2><p>Overview of Fitanya platform</p></div>
    <div id="stats-grid" class="stats-grid mb-32"><div class="spinner"></div></div>
    <div class="grid-2 gap-24">
      <div>
        <div class="section-title">Recent Members</div>
        <div id="recent-members"><div class="spinner"></div></div>
      </div>
      <div>
        <div class="section-title">Pending Stories</div>
        <div id="pending-stories"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="mt-32">
      <div class="section-title">Pending UPI Payments <span id="pending-pay-badge" class="badge badge-yellow hidden" style="margin-left:8px"></span></div>
      <div id="pending-payments"><div class="spinner"></div></div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    const [stats, members, stories, pendingPay] = await Promise.all([
      api.get('/api/admin/stats'),
      api.get('/api/admin/members'),
      api.get('/api/admin/stories?status=pending'),
      api.get('/api/admin/payments/pending'),
    ]);

    if (!stats?.success) { window.location.href = '/login'; return; }

    const s = stats.stats;
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Members</div><div class="stat-value orange">${s.customers}</div></div>
      <div class="stat-card"><div class="stat-label">Coaches</div><div class="stat-value">${s.coaches}</div></div>
      <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-value">${s.bookings}</div></div>
      <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value orange">₹${Number(s.revenue).toLocaleString('en-IN')}</div></div>
    `;

    const membEl = document.getElementById('recent-members');
    const latest = (members?.members || []).slice(0, 5);
    membEl.innerHTML = latest.length ? latest.map(m => `
      <div class="card mb-12 flex-between" style="padding:16px">
        <div><div class="text-white" style="font-weight:600">${m.name}</div><div class="text-dim text-small">${m.email}</div></div>
        <span class="badge ${m.membership_status === 'active' ? 'badge-green' : 'badge-yellow'}">${m.membership_status || 'no plan'}</span>
      </div>
    `).join('') : '<div class="card"><p class="text-dim">No members yet</p></div>';

    const storEl = document.getElementById('pending-stories');
    const pend = stories?.stories || [];
    storEl.innerHTML = pend.length ? pend.map(s => `
      <div class="card mb-12" style="padding:16px">
        <div class="flex-between mb-8">
          <strong class="text-white text-small">${s.user_name}</strong>
          <a href="/admin/stories" class="btn btn-primary btn-sm">Review</a>
        </div>
        <p class="text-dim text-small">${s.body.substring(0, 80)}...</p>
      </div>
    `).join('') : '<div class="card"><p class="text-dim">No pending stories</p></div>';

    const payEl = document.getElementById('pending-payments');
    const pays = pendingPay?.payments || [];
    if (pays.length) {
      document.getElementById('pending-pay-badge').textContent = pays.length;
      document.getElementById('pending-pay-badge').classList.remove('hidden');
    }
    payEl.innerHTML = pays.length ? pays.map(p => `
      <div class="card mb-12" style="padding:16px" id="pp-${p.id}">
        <div class="flex-between mb-8">
          <div>
            <div class="text-white" style="font-weight:600">${p.member_name || 'Unknown'}</div>
            <div class="text-dim text-small">${p.member_email || ''} · ${p.member_phone || ''}</div>
            <div class="text-dim text-small mt-4">Package: <strong class="text-white">${p.package_name || '—'}</strong></div>
          </div>
          <div class="text-right">
            <div style="font-family:var(--font-display);font-size:1.4rem;color:var(--orange)">₹${Number(p.final_amount).toLocaleString('en-IN')}</div>
            <div class="text-dim text-small">${p.method?.toUpperCase() || 'UPI'}</div>
            <div class="text-dim text-small">${new Date(p.created_at).toLocaleDateString('en-IN')}</div>
          </div>
        </div>
        <div class="flex gap-8 mt-8">
          <button class="btn btn-primary btn-sm" onclick="confirmPayment(${p.id})">✓ Confirm Received</button>
          <button class="btn btn-outline btn-sm" onclick="rejectPayment(${p.id})" style="color:var(--red,#e55)">✗ Reject</button>
        </div>
      </div>
    `).join('') : '<div class="card"><p class="text-dim">No pending UPI payments</p></div>';
  }

  async function confirmPayment(id) {
    const btn = event.target;
    btn.disabled = true; btn.textContent = 'Confirming...';
    const data = await api.post(`/api/admin/payments/${id}/confirm`, {});
    if (data?.success) {
      document.getElementById(`pp-${id}`)?.remove();
      toast('Payment confirmed — membership activated!', 'success');
    } else {
      toast(data?.error || 'Failed', 'error');
      btn.disabled = false; btn.textContent = '✓ Confirm Received';
    }
  }

  async function rejectPayment(id) {
    if (!confirm('Reject this payment? This will cancel the pending membership.')) return;
    const data = await api.post(`/api/admin/payments/${id}/reject`, {});
    if (data?.success) {
      document.getElementById(`pp-${id}`)?.remove();
      toast('Payment rejected', 'success');
    } else {
      toast(data?.error || 'Failed', 'error');
    }
  }

  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
