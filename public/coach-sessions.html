<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .tabs { display:flex; gap:4px; background:var(--muted); border-radius:10px; padding:4px; margin-bottom:24px; width:fit-content; }
    .tab { padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; color:var(--text-dim); transition:all 0.15s; }
    .tab.active { background:var(--orange); color:#fff; }
    .session-card { background:var(--muted); border-radius:12px; padding:18px; margin-bottom:12px; }
    .meet-btn { background:rgba(34,197,94,0.15); color:#22c55e; border:1px solid #22c55e; padding:6px 14px; border-radius:8px; font-size:13px; font-weight:600; text-decoration:none; white-space:nowrap; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/coach" class="sidebar-logo">FIT<span>ANIYA</span></a>
    <nav class="sidebar-nav">
      <a href="/coach" class="nav-item"><span class="icon">🏠</span>Dashboard</a>
      <a href="/coach/schedule" class="nav-item"><span class="icon">📅</span>My Schedule</a>
      <a href="/coach/customers" class="nav-item"><span class="icon">👥</span>My Members</a>
      <a href="/coach/sessions" class="nav-item active"><span class="icon">📝</span>Sessions</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header mb-24"><h2>Sessions</h2><p>Manage upcoming sessions and add notes for completed ones</p></div>

    <div class="tabs">
      <div class="tab active" id="tab-upcoming" onclick="showTab('upcoming')">Upcoming</div>
      <div class="tab" id="tab-past" onclick="showTab('past')">Past Sessions</div>
      <div class="tab" id="tab-notes" onclick="showTab('notes')">Needs Notes</div>
    </div>

    <div id="pane-upcoming"></div>
    <div id="pane-past" style="display:none"></div>
    <div id="pane-notes" style="display:none"></div>
  </main>
</div>

<!-- Notes Modal -->
<div class="modal-overlay hidden" id="notes-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('notes-modal').classList.add('hidden')">×</button>
    <h3 class="modal-title">Session Notes</h3>
    <p class="text-dim mt-4 mb-24" id="notes-subtitle"></p>
    <input type="hidden" id="notes-bid" />
    <div class="form-group"><label>Session Notes *</label><textarea class="form-control" id="notes-text" rows="4" placeholder="What did you work on? How did the member perform?"></textarea></div>
    <div class="form-group"><label>Workout Done</label><input class="form-control" id="notes-workout" placeholder="e.g. Upper body — 4x10 bench press, rows, shoulder press" /></div>
    <div class="form-group"><label>Next Session Plan</label><textarea class="form-control" id="notes-next" rows="2" placeholder="What to focus on next time?"></textarea></div>
    <button class="btn btn-primary btn-full" onclick="saveNotes()">Save & Mark Complete</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  let sessions = [];

  async function init() {
    const data = await api.get('/api/coach/sessions');
    if (!data?.success) { window.location.href = '/login'; return; }
    sessions = data.sessions || [];
    renderAll();
  }

  function renderAll() {
    const today = new Date().toISOString().split('T')[0];
    const upcoming = sessions.filter(s => !s.is_completed && s.date >= today);
    const past = sessions.filter(s => s.is_completed || s.date < today);
    const needsNotes = sessions.filter(s => s.is_completed && !s.has_notes);

    document.getElementById('pane-upcoming').innerHTML = upcoming.length
      ? upcoming.map(s => sessionCard(s, 'upcoming')).join('')
      : '<div class="card"><p class="text-dim">No upcoming sessions.</p></div>';

    document.getElementById('pane-past').innerHTML = past.length
      ? past.map(s => sessionCard(s, 'past')).join('')
      : '<div class="card"><p class="text-dim">No past sessions yet.</p></div>';

    document.getElementById('pane-notes').innerHTML = needsNotes.length
      ? needsNotes.map(s => sessionCard(s, 'notes')).join('')
      : '<div class="card"><p class="text-dim">All sessions have notes.</p></div>';

    // Update tab labels
    document.getElementById('tab-notes').textContent = needsNotes.length ? `Needs Notes (${needsNotes.length})` : 'Needs Notes';
  }

  function sessionCard(s, mode) {
    const isPast = s.is_completed;
    return `<div class="session-card">
      <div class="flex-between mb-12">
        <div>
          <div style="font-weight:700;color:var(--white);font-size:1rem">${s.customer_name}</div>
          <div class="text-dim text-small mt-2">${formatDate(s.date)} · ${formatTime(s.start_time)}</div>
        </div>
        <div class="flex gap-8 flex-wrap" style="justify-content:flex-end">
          ${isPast ? '<span class="badge badge-green">Completed</span>' : '<span class="badge badge-orange">Upcoming</span>'}
          ${s.has_notes ? '<span class="badge badge-blue">Notes Added</span>' : (isPast ? '<span class="badge badge-red">Needs Notes</span>' : '')}
        </div>
      </div>
      <div class="flex gap-8 flex-wrap">
        ${s.meet_link ? `<a href="${s.meet_link}" target="_blank" class="meet-btn">Join Google Meet</a>` : ''}
        ${!s.has_notes ? `<button class="btn btn-primary btn-sm" onclick="openNotes(${s.id},'${s.customer_name}','${s.date}')">${isPast ? 'Add Notes' : 'Mark Complete + Notes'}</button>` : ''}
        ${s.has_notes && s.notes ? `<div class="text-dim text-small mt-8" style="width:100%">📝 ${s.notes}</div>` : ''}
      </div>
    </div>`;
  }

  function showTab(name) {
    ['upcoming','past','notes'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === name);
      document.getElementById('pane-' + t).style.display = t === name ? '' : 'none';
    });
  }

  function openNotes(bookingId, name, date) {
    document.getElementById('notes-bid').value = bookingId;
    document.getElementById('notes-subtitle').textContent = `Session with ${name} on ${formatDate(date)}`;
    document.getElementById('notes-text').value = '';
    document.getElementById('notes-workout').value = '';
    document.getElementById('notes-next').value = '';
    document.getElementById('notes-modal').classList.remove('hidden');
  }

  async function saveNotes() {
    const bookingId = document.getElementById('notes-bid').value;
    const notes = document.getElementById('notes-text').value.trim();
    if (!notes) return toast('Please add session notes', 'error');
    const data = await api.post('/api/bookings/notes/' + bookingId, {
      notes,
      workout_done: document.getElementById('notes-workout').value,
      next_session_plan: document.getElementById('notes-next').value,
    });
    if (data?.success) {
      toast('Notes saved!', 'success');
      document.getElementById('notes-modal').classList.add('hidden');
      init();
    } else toast(data?.error || 'Failed', 'error');
  }

  init();
</script>
</body>
</html>
