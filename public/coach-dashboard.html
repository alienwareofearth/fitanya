<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Coach Dashboard — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/coach" class="sidebar-logo"><img src="/icons/logo.png" alt="Fitanya"><span class="sidebar-logo-text">FIT<span>ANYA</span></span></a>
    <div id="sidebar-profile"></div>
    <nav class="sidebar-nav">
      <a href="/coach" class="nav-item active"><span class="icon">🏠</span>Dashboard</a>
      <a href="/coach/schedule" class="nav-item"><span class="icon">📅</span>My Schedule</a>
      <a href="/coach/customers" class="nav-item"><span class="icon">👥</span>My Clients</a>
      <a href="/coach/sessions" class="nav-item"><span class="icon">📝</span>Session Notes</a>
      <a href="/coach/profile" class="nav-item"><span class="icon">👤</span>My Profile</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="flex-between mb-32">
      <div id="coach-greeting"><div class="greeting-name">Loading...</div></div>
    </div>
    <div class="stats-grid mb-32">
      <div class="stat-card"><div class="stat-label">My Clients</div><div class="stat-value orange" id="s-customers">—</div></div>
      <div class="stat-card"><div class="stat-label">Today's Sessions</div><div class="stat-value" id="s-today">—</div></div>
      <div class="stat-card"><div class="stat-label">Upcoming Sessions</div><div class="stat-value" id="s-upcoming">—</div></div>
      <div class="stat-card"><div class="stat-label">Notes Pending</div><div class="stat-value orange" id="s-notes">—</div></div>
    </div>
    <div class="section-title">Today's Sessions</div>
    <div id="today-sessions"><div class="spinner"></div></div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    const [initData, schedData] = await Promise.all([
      api.get('/api/coach/init'),
      api.get('/api/coach/my-schedule'),
    ]);
    if (!initData?.success) { window.location.href = '/login'; return; }

    const coach = initData.coach;
    window.__userTz = coach?.timezone || 'Asia/Kolkata';

    document.getElementById('coach-greeting').innerHTML = `
      <div class="greeting-name">${getGreeting()}, Coach <span class="gradient-text">${(coach?.name||'').split(' ')[0]}!</span></div>
      <div class="greeting-quote">${getDailyQuote()}</div>
    `;

    const today = new Date().toISOString().split('T')[0];
    const slots = schedData?.slots || [];
    const todaySlots = slots.filter(s => s.date === today);
    const upcoming  = slots.filter(s => s.date > today);
    const sessions  = initData.sessions || [];
    const notesPending = sessions.filter(s => s.is_completed && !s.has_notes).length;

    document.getElementById('s-customers').textContent = initData.customers?.length || 0;
    document.getElementById('s-today').textContent    = todaySlots.filter(s => s.booking_id).length;
    document.getElementById('s-upcoming').textContent = upcoming.filter(s => s.booking_id).length;
    document.getElementById('s-notes').textContent    = notesPending;

    const bookedToday = todaySlots.filter(s => s.booking_id);
    const el = document.getElementById('today-sessions');
    if (!bookedToday.length) {
      el.innerHTML = '<div class="card"><p class="text-dim">No sessions booked for today.</p></div>';
      return;
    }
    el.innerHTML = bookedToday.map(s => `
      <div class="card mb-12" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
        <div>
          <div class="text-white" style="font-weight:600;font-size:1rem">${s.customer_name || 'Client'}</div>
          <div class="text-dim text-small mt-2">${formatSessionTime(s.start_time, s.date)} – ${formatSessionTime(s.end_time, s.date)} <span style="opacity:.5">${tzLabel()}</span></div>
        </div>
        <div class="flex gap-8" style="flex-wrap:wrap">
          ${s.meet_link
            ? `<a href="${s.meet_link}" target="_blank" class="btn btn-primary btn-sm" style="display:flex;align-items:center;gap:6px"><span>▶</span> Join Meet</a>`
            : `<span class="btn btn-primary btn-sm" style="opacity:.5;cursor:default">Link Pending</span>`}
          ${s.is_completed
            ? `<span class="badge badge-green">Done</span>`
            : (!s.notes_id
                ? `<a href="/coach/sessions" class="btn btn-dark btn-sm">Add Notes</a>`
                : '')}
        </div>
      </div>
    `).join('');
  }
  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
