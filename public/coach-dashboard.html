<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Dashboard — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/coach" class="sidebar-logo">FIT<span>ANIYA</span></a>
    <nav class="sidebar-nav">
      <a href="/coach" class="nav-item active"><span class="icon">🏠</span>Dashboard</a>
      <a href="/coach/schedule" class="nav-item"><span class="icon">📅</span>My Schedule</a>
      <a href="/coach/customers" class="nav-item"><span class="icon">👥</span>My Clients</a>
      <a href="/coach/sessions" class="nav-item"><span class="icon">📝</span>Session Notes</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="flex-between mb-32">
      <div id="coach-greeting"><div class="greeting-name">Loading...</div></div>
    </div>
    <div class="stats-grid mb-32">
      <div class="stat-card"><div class="stat-label">My Clients</div><div class="stat-value orange" id="s-customers">—</div></div>
      <div class="stat-card"><div class="stat-label">Today's Sessions</div><div class="stat-value" id="s-today">—</div></div>
      <div class="stat-card"><div class="stat-label">Upcoming Sessions</div><div class="stat-value" id="s-upcoming">—</div></div>
      <div class="stat-card"><div class="stat-label">Notes Pending</div><div class="stat-value orange" id="s-notes">—</div></div>
    </div>
    <div class="section-title">Today's Sessions</div>
    <div id="today-sessions"><div class="spinner"></div></div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    const [profileData, schedData, custData, sessData] = await Promise.all([
      api.get('/api/customer/profile'),
      api.get('/api/coach/my-schedule'),
      api.get('/api/coach/my-customers'),
      api.get('/api/coach/sessions'),
    ]);
    if (!profileData?.success) { window.location.href = '/login'; return; }
    if (profileData.user.role !== 'coach' && profileData.user.role !== 'admin') {
      window.location.href = '/dashboard'; return;
    }
    const user = profileData.user;
    document.getElementById('coach-greeting').innerHTML = `
      <div class="greeting-name">${getGreeting()}, Coach <span class="gradient-text">${user.name.split(' ')[0]}!</span></div>
      <div class="greeting-quote">${getDailyQuote()}</div>
    `;

    const today = new Date().toISOString().split('T')[0];
    const slots = schedData?.slots || [];
    const todaySlots = slots.filter(s => s.date === today);
    const upcoming = slots.filter(s => s.date > today);
    const notesPending = (sessData?.sessions || []).filter(s => s.is_completed && !s.has_notes).length;

    document.getElementById('s-customers').textContent = custData?.customers?.length || 0;
    document.getElementById('s-today').textContent = todaySlots.length;
    document.getElementById('s-upcoming').textContent = upcoming.length;
    document.getElementById('s-notes').textContent = notesPending;

    const el = document.getElementById('today-sessions');
    if (!todaySlots.length) {
      el.innerHTML = '<div class="card"><p class="text-dim">No sessions today.</p></div>'; return;
    }
    el.innerHTML = todaySlots.map(s => `
      <div class="card mb-16 flex-between">
        <div>
          <div class="text-white" style="font-weight:600">${s.customer_name || 'Available Slot'}</div>
          <div class="text-dim text-small">${formatTime(s.start_time)} – ${formatTime(s.end_time)}</div>
        </div>
        <div class="flex gap-8">
          ${s.booking_id ? `<span class="badge badge-orange">Booked</span>` : '<span class="badge badge-green">Open</span>'}
          ${s.booking_id && !s.notes_id ? `<a href="/coach/sessions" class="btn btn-primary btn-sm">Add Notes</a>` : ''}
        </div>
      </div>
    `).join('');
  }
  init();
</script>
</body>
</html>
