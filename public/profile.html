<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Profile — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">FIT<span>ANYA</span></a>
    <div id="sidebar-profile"></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><span class="icon">🏠</span>Dashboard</a>
      <a href="/dashboard/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <a href="/dashboard/membership" class="nav-item"><span class="icon">🎫</span>Membership</a>
      <a href="/dashboard/payment" class="nav-item"><span class="icon">💳</span>Pay Now</a>
      <a href="/dashboard/progress" class="nav-item"><span class="icon">📊</span>Progress</a>
      <a href="/dashboard/diet" class="nav-item"><span class="icon">🥗</span>Diet & Nutrition</a>
      <a href="/dashboard/stories" class="nav-item"><span class="icon">📸</span>My Stories</a>
      <a href="/dashboard/referral" class="nav-item"><span class="icon">🎁</span>Refer & Earn</a>
      <a href="/dashboard/profile" class="nav-item active"><span class="icon">👤</span>Profile</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header mb-32">
      <h2>My Profile</h2>
      <p>Update your personal details and track your body measurements over time</p>
    </div>
    <div class="grid-2 gap-24">
      <!-- Photo + basic -->
      <div>
        <div class="card mb-24" style="text-align:center;padding:40px">
          <img id="profile-pic" src="/images/default-avatar.png" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--orange);margin-bottom:16px" />
          <div style="font-family:var(--font-display);font-size:1.6rem;color:var(--white)" id="profile-name">—</div>
          <div class="text-dim text-small" id="profile-email">—</div>
          <div class="mt-16">
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto(this)" />
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('photo-input').click()">Change Photo</button>
          </div>
        </div>
        <div class="card">
          <div class="section-title">Quick Stats</div>
          <div id="quick-stats"></div>
        </div>
      </div>

      <!-- Edit form -->
      <div class="card">
        <div class="section-title">Edit Details</div>
        <div class="form-group"><label>Full Name</label><input class="form-control" id="f-name" /></div>
        <div class="form-group"><label>Phone</label><input class="form-control" id="f-phone" /></div>
        <div class="form-group"><label>Timezone</label>
          <select class="form-control" id="f-timezone">
            <option value="Asia/Kolkata">IST — India Standard Time (UTC+5:30)</option>
            <option value="America/New_York">EST — Eastern Time (UTC-5/4)</option>
            <option value="America/Chicago">CST — Central Time (UTC-6/5)</option>
            <option value="America/Los_Angeles">PST — Pacific Time (UTC-8/7)</option>
            <option value="Europe/London">GMT — London (UTC+0/1)</option>
            <option value="Asia/Dubai">GST — Gulf Standard Time (UTC+4)</option>
          </select>
        </div>
        <div class="form-group"><label>Occupation</label><input class="form-control" id="f-occupation" /></div>
        <div class="form-group"><label>Address</label><textarea class="form-control" id="f-address" rows="2"></textarea></div>
        <div class="form-group"><label>Food Preference</label>
          <select class="form-control" id="f-food">
            <option value="">Select</option><option>Veg</option><option>Vegan</option><option>Non-Veg</option>
          </select>
        </div>
        <div class="form-group"><label>Fitness Goal</label>
          <select class="form-control" id="f-goal">
            <option value="">Select</option>
            <option>Get Lean</option><option>Build Muscle</option><option>Tone &amp; Sculpt</option><option>Improve Fitness</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preferred Workout Time <span class="text-dim text-small">— shown first on Schedule page</span></label>
          <input class="form-control" type="time" id="f-preferred-time" />
          <div class="text-dim text-small mt-4">Leave blank to see all available slots (no preference)</div>
        </div>
        <div class="form-group"><label>Health Issues</label><input class="form-control" id="f-health" /></div>
        <div class="form-group"><label>Allergies</label><input class="form-control" id="f-allergies" /></div>
        <div class="grid-2 gap-12">
          <div class="form-group"><label>Height (cm)</label><input class="form-control" type="number" id="f-height" /></div>
          <div class="form-group"><label>Starting Weight (kg)</label><input class="form-control" type="number" id="f-weight" step="0.1" /></div>
          <div class="form-group"><label>Ideal / Goal Weight (kg)</label><input class="form-control" type="number" id="f-ideal-weight" step="0.1" /></div>
          <div class="form-group"><label>Waist"</label><input class="form-control" type="number" id="f-waist" step="0.5" /></div>
          <div class="form-group"><label>Chest"</label><input class="form-control" type="number" id="f-chest" step="0.5" /></div>
        </div>
        <button class="btn btn-primary btn-full" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="card mt-32" id="danger-zone" style="border-color:rgba(185,28,28,0.3)">
      <div class="section-title" style="color:#f87171;border-bottom-color:rgba(185,28,28,0.2)">Danger Zone</div>
      <div id="deletion-status-wrap" style="margin-top:16px"></div>
    </div>

  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    const data = await requireAuth();
    if (!data) return;
    const { user, profile } = data;

    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-email').textContent = user.email;
    if (user.profile_picture) document.getElementById('profile-pic').src = user.profile_picture;

    window.__userTz = user.timezone || 'Asia/Kolkata';
    document.getElementById('f-name').value = user.name || '';
    document.getElementById('f-phone').value = user.phone || '';
    document.getElementById('f-timezone').value = user.timezone || 'Asia/Kolkata';
    document.getElementById('f-occupation').value = profile?.occupation || '';
    document.getElementById('f-address').value = profile?.address || '';
    document.getElementById('f-food').value = profile?.food_preference || '';
    document.getElementById('f-goal').value = profile?.fitness_goal || '';
    document.getElementById('f-health').value = profile?.health_issues || '';
    document.getElementById('f-allergies').value = profile?.allergies || '';
    document.getElementById('f-height').value = profile?.height || '';
    document.getElementById('f-weight').value = profile?.weight || '';
    document.getElementById('f-ideal-weight').value = profile?.ideal_weight || '';
    document.getElementById('f-waist').value = profile?.waist || '';
    document.getElementById('f-chest').value = profile?.chest || '';
    document.getElementById('f-preferred-time').value = profile?.preferred_time || '';

    document.getElementById('quick-stats').innerHTML = `
      <div class="flex-between mb-8"><span class="text-dim">Member Since</span><span>${formatDate(user.created_at)}</span></div>
      <div class="flex-between mb-8"><span class="text-dim">Referral Credits</span><span class="text-orange">₹${user.reward_credits || 0}</span></div>
      <div class="flex-between mb-8"><span class="text-dim">Fitness Goal</span><span>${profile?.fitness_goal || '—'}</span></div>
      <div class="flex-between"><span class="text-dim">Food Preference</span><span>${profile?.food_preference || '—'}</span></div>
    `;

    renderDangerZone(user);
  }

  function renderDangerZone(user) {
    const wrap = document.getElementById('deletion-status-wrap');
    if (user.pendingDeletion) {
      const days = user.daysRemaining ?? 0;
      const date = new Date(Date.now() + days * 86400000).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
      wrap.innerHTML = `
        <div style="background:rgba(185,28,28,0.08);border:1px solid rgba(185,28,28,0.25);border-radius:10px;padding:18px 20px;margin-bottom:16px">
          <div style="color:#f87171;font-weight:700;margin-bottom:6px">⏳ Deletion scheduled in ${days} day${days !== 1 ? 's' : ''}</div>
          <div style="color:#fca5a5;font-size:13px;margin-bottom:14px">
            Your account will be permanently erased on <strong>${date}</strong>.<br>
            Bookings, sessions, and payment records are kept for our records.<br>
            You can recover your account anytime before that date.
          </div>
          <button class="btn btn-primary" onclick="cancelDeletion()">↩ Recover My Account</button>
        </div>
      `;
    } else {
      wrap.innerHTML = `
        <p class="text-dim text-small mb-16">
          Deleting your account will remove all your personal data — name, contact info, health data, and measurements — after a 7-day grace period.
          Your booking history and payment records are kept for our records. You can recover your account within 7 days by logging back in.
        </p>
        <button class="btn btn-sm" onclick="requestDeletion()" style="background:rgba(185,28,28,0.12);color:#f87171;border:1px solid rgba(185,28,28,0.3)">
          🗑️ Delete My Account
        </button>
      `;
    }
  }

  async function requestDeletion() {
    if (!confirm('Are you sure you want to delete your account?\n\nYour data will be erased in 7 days. You can recover it by logging in before then.')) return;
    const data = await api.post('/api/customer/account/request-deletion', {});
    if (data?.success) {
      toast('Account deletion scheduled. You have 7 days to recover it.', 'warning');
      setTimeout(() => init(), 800);
    } else {
      toast(data?.error || 'Failed', 'error');
    }
  }

  async function cancelDeletion() {
    const data = await api.post('/api/customer/account/cancel-deletion', {});
    if (data?.success) {
      toast('Account recovered successfully! 🎉', 'success');
      // Remove the top banner if it was shown
      document.getElementById('deletion-banner')?.remove();
      setTimeout(() => init(), 800);
    } else {
      toast(data?.error || 'Failed', 'error');
    }
  }

  async function saveProfile() {
    const payload = {
      name: document.getElementById('f-name').value,
      phone: document.getElementById('f-phone').value,
      timezone: document.getElementById('f-timezone').value,
      occupation: document.getElementById('f-occupation').value,
      address: document.getElementById('f-address').value,
      food_preference: document.getElementById('f-food').value,
      fitness_goal: document.getElementById('f-goal').value,
      health_issues: document.getElementById('f-health').value,
      allergies: document.getElementById('f-allergies').value,
      height: document.getElementById('f-height').value,
      weight: document.getElementById('f-weight').value,
      ideal_weight: document.getElementById('f-ideal-weight').value,
      waist: document.getElementById('f-waist').value,
      chest: document.getElementById('f-chest').value,
    };
    const preferredTime = document.getElementById('f-preferred-time').value || null;
    const [profileRes, prefRes] = await Promise.all([
      api.put('/api/customer/profile', payload),
      api.put('/api/customer/preferred-slot', { preferred_time: preferredTime }),
    ]);
    if (profileRes?.success) { toast('Profile saved!', 'success'); init(); }
    else toast(profileRes?.error || 'Failed', 'error');
  }

  async function uploadPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('photo', file);
    const data = await api.upload('/api/customer/profile/picture', fd);
    if (data?.success) { document.getElementById('profile-pic').src = data.url; toast('Photo updated!', 'success'); }
    else toast(data?.error || 'Upload failed', 'error');
  }

  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
