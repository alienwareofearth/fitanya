<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Diet & Nutrition — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    .meal-card { background:var(--dark); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
    .meal-type { font-family:var(--font-display); font-size:1.1rem; color:var(--orange); margin-bottom:6px; }
    .water-glass { font-size:28px; cursor:pointer; transition:transform 0.15s; display:inline-block; }
    .water-glass.filled { filter:hue-rotate(0deg); }
    .water-glass.empty { opacity:0.3; }
    .water-glass:hover { transform:scale(1.2); }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">FIT<span>ANYA</span></a>
    <div id="sidebar-profile"></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><span class="icon">🏠</span>Dashboard</a>
      <a href="/dashboard/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <a href="/dashboard/membership" class="nav-item"><span class="icon">🎫</span>Membership</a>
      <a href="/dashboard/payment" class="nav-item"><span class="icon">💳</span>Pay Now</a>
      <a href="/dashboard/progress" class="nav-item"><span class="icon">📊</span>Progress</a>
      <a href="/dashboard/diet" class="nav-item active"><span class="icon">🥗</span>Diet & Nutrition</a>
      <a href="/dashboard/stories" class="nav-item"><span class="icon">📸</span>My Stories</a>
      <a href="/dashboard/referral" class="nav-item"><span class="icon">🎁</span>Refer & Earn</a>
      <a href="/dashboard/profile" class="nav-item"><span class="icon">👤</span>Profile</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header flex-between mb-32">
      <div>
        <h2>Diet &amp; Nutrition</h2>
        <p>Your personalised meal plan &nbsp;<span id="cache-age" class="text-dim text-small"></span></p>
      </div>
      <button class="btn btn-dark btn-sm" onclick="syncDiet()">🔄 Refresh</button>
    </div>

    <div class="grid-2 gap-24">
      <!-- Meal plan -->
      <div>
        <div class="card mb-24">
          <div class="section-title">Today's Meal Plan</div>
          <div class="form-group">
            <label>Select Date</label>
            <input class="form-control" id="diet-date" readonly />
          </div>
          <div id="diet-plan-info" class="mb-16"></div>
          <div id="meals-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Hydration tracker -->
      <div>
        <div class="card">
          <div class="section-title">💧 Water Tracker</div>
          <p class="text-dim text-small mb-24">Stay hydrated! Tap a glass to log water intake.</p>
          <div id="water-glasses" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px"></div>
          <div class="flex-between mb-12">
            <span class="text-dim text-small">Progress</span>
            <span id="water-label" class="text-orange text-small">0 / 8 glasses</span>
          </div>
          <div class="progress-bar-wrap mb-24">
            <div class="progress-bar-fill" id="water-bar" style="width:0%"></div>
          </div>
          <div class="flex gap-8">
            <button class="btn btn-dark btn-sm" onclick="changeGoal(-1)">− Goal</button>
            <button class="btn btn-primary btn-sm" onclick="changeGoal(1)">+ Goal</button>
          </div>
          <p class="text-dim text-small mt-8">Goal: <span id="goal-display">8</span> glasses/day</p>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="/js/app.js"></script>
<script>
  let currentGlasses = 0;
  let goalGlasses = 8;
  let today = new Date().toISOString().split('T')[0];
  let _currentDate = today;

  function dietCacheKey(date) { return 'diet_' + date; }

  function showAge(date) {
    const age = pageCache.ageLabel(dietCacheKey(date));
    const el = document.getElementById('cache-age');
    if (el) el.textContent = age ? '· cached ' + age : '';
  }

  function syncDiet() {
    pageCache.bust(dietCacheKey(_currentDate));
    loadDiet(_currentDate, true);
  }

  async function init() {
    await requireAuth();
    flatpickr('#diet-date', {
      defaultDate: today,
      dateFormat: 'Y-m-d',
      onChange: ([d]) => { _currentDate = d.toISOString().split('T')[0]; loadDiet(_currentDate); },
    });
    loadDiet(today);
    loadHydration(today);
  }

  async function loadDiet(date, bust = false) {
    if (bust) pageCache.bust(dietCacheKey(date));
    const cacheKey = dietCacheKey(date);
    const cached = pageCache.get(cacheKey);
    if (cached) {
      renderDietData(cached);
      showAge(date);
      return;
    }
    document.getElementById('meals-wrap').innerHTML = '<div class="spinner"></div>';
    const data = await api.get('/api/customer/diet?date=' + date);
    if (data?.success) pageCache.set(cacheKey, data);
    if (!data?.success) return;

    renderDietData(data);
    showAge(date);
  }

  function renderDietData(data) {
    if (data.plan) {
      document.getElementById('diet-plan-info').innerHTML = `
        <div class="flex-between">
          <div><strong class="text-white">${data.plan.name}</strong><br><span class="text-dim text-small">${data.plan.food_preference} · ${data.plan.fitness_goal || 'General'}</span></div>
          ${data.plan.calories_per_day ? `<span class="badge badge-orange">${data.plan.calories_per_day} kcal/day</span>` : ''}
        </div>
      `;
    }

    if (!data.meals?.length) {
      document.getElementById('meals-wrap').innerHTML = `
        <div class="text-center" style="padding:32px">
          <p class="text-dim">No meal plan for ${data.day || 'this day'}.</p>
          <p class="text-dim text-small mt-8">Your coach or admin will add meals soon.</p>
        </div>
      `;
      return;
    }

    const grouped = {};
    data.meals.forEach(m => { if (!grouped[m.meal_type]) grouped[m.meal_type] = []; grouped[m.meal_type].push(m); });

    document.getElementById('meals-wrap').innerHTML = Object.entries(grouped).map(([type, meals]) => `
      <div class="meal-card">
        <div class="meal-type">${type}</div>
        ${meals.map(m => `
          <div style="margin-bottom:8px">
            <strong class="text-white">${m.name}</strong>
            ${m.calories ? `<span class="badge badge-blue" style="margin-left:8px">${m.calories} kcal</span>` : ''}
            ${m.description ? `<p class="text-dim text-small mt-4">${m.description}</p>` : ''}
            ${m.recipe ? `<details class="mt-8"><summary class="text-orange text-small" style="cursor:pointer">View Recipe</summary><p class="text-dim text-small mt-8">${m.recipe}</p></details>` : ''}
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  async function loadHydration(date) {
    const data = await api.get('/api/customer/hydration?date=' + date);
    currentGlasses = data?.log?.glasses || 0;
    goalGlasses = data?.log?.goal_glasses || 8;
    renderGlasses();
  }

  function renderGlasses() {
    const wrap = document.getElementById('water-glasses');
    wrap.innerHTML = '';
    for (let i = 1; i <= goalGlasses; i++) {
      const span = document.createElement('span');
      span.className = 'water-glass ' + (i <= currentGlasses ? 'filled' : 'empty');
      span.textContent = '💧';
      span.onclick = () => toggleGlass(i);
      wrap.appendChild(span);
    }
    document.getElementById('water-label').textContent = `${currentGlasses} / ${goalGlasses} glasses`;
    document.getElementById('goal-display').textContent = goalGlasses;
    const pct = Math.min(100, Math.round((currentGlasses / goalGlasses) * 100));
    document.getElementById('water-bar').style.width = pct + '%';
  }

  async function toggleGlass(n) {
    currentGlasses = currentGlasses === n ? n - 1 : n;
    renderGlasses();
    await api.post('/api/customer/hydration', { glasses: currentGlasses, goal_glasses: goalGlasses, date: today });
  }

  async function changeGoal(delta) {
    goalGlasses = Math.max(4, Math.min(16, goalGlasses + delta));
    renderGlasses();
    await api.post('/api/customer/hydration', { glasses: currentGlasses, goal_glasses: goalGlasses, date: today });
  }

  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
