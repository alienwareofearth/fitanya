<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Complete Registration — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>body{background:var(--black)}</style>
</head>
<body>
  <div style="max-width:600px;margin:60px auto;padding:24px">
    <a href="/" class="sidebar-logo" style="justify-content:center;margin-bottom:32px"><img src="/icons/logo.png" alt="Fitanya" style="height:56px"><span class="sidebar-logo-text">FIT<span>ANYA</span></span></a>
    <div class="card">
      <h3 style="font-family:var(--font-display);font-size:1.8rem;margin-bottom:8px">Complete Your Registration</h3>
      <p class="text-dim mb-32">Create your password to activate your account and start training.</p>
      <div class="form-group"><label>Email</label><input class="form-control" id="r-email" type="email" /></div>
      <div class="form-group"><label>Password *</label><input class="form-control" id="r-pass" type="password" placeholder="Min 8 characters" /></div>
      <div class="form-group"><label>Confirm Password *</label><input class="form-control" id="r-pass2" type="password" placeholder="Repeat password" /></div>
      <button class="btn btn-primary btn-full" onclick="setPassword()">Activate Account →</button>
      <p class="text-center mt-16 text-small text-dim">Already have an account? <a href="/login" class="text-orange">Login here</a></p>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    if (email) document.getElementById('r-email').value = email;

    async function setPassword() {
      const pass = document.getElementById('r-pass').value;
      const pass2 = document.getElementById('r-pass2').value;
      if (pass !== pass2) return toast('Passwords do not match', 'error');
      if (pass.length < 8) return toast('Min 8 characters', 'error');
      toast('Please use the registration flow from the homepage to set up your full profile.', 'info');
    }
  </script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
