<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Schedule — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* Accordion date groups */
    .date-group { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .date-group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; cursor: pointer; background: var(--card);
      transition: background 0.15s; user-select: none;
    }
    .date-group-header:hover { background: rgba(255,92,0,0.06); }
    .date-group-header.open { background: rgba(255,92,0,0.08); border-bottom: 1px solid var(--border); }
    .date-group-label { font-weight: 600; color: var(--white); font-size: 15px; }
    .date-group-meta { display: flex; align-items: center; gap: 10px; }
    .date-slot-count { font-size: 12px; background: rgba(255,92,0,0.15); color: var(--orange); padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .date-chevron { color: var(--text-dim); font-size: 13px; transition: transform 0.2s; }
    .date-chevron.open { transform: rotate(180deg); }
    .date-group-body { display: none; padding: 14px 18px; }
    .date-group-body.open { display: block; }
    /* Compact slot chips */
    .slot-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .slot-chip {
      padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--muted); cursor: pointer; transition: all 0.15s;
      font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap;
    }
    .slot-chip:hover { border-color: var(--orange); color: var(--white); background: rgba(255,92,0,0.08); }
    .slot-chip.selected { border-color: var(--orange); background: rgba(255,92,0,0.15); color: var(--white); }
    .slot-coach-tag { font-size: 11px; color: var(--text-dim); font-weight: 400; }
    /* Booking rows */
    .booking-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
    }
    .booking-date-box {
      background: var(--grad); border-radius: var(--radius-sm);
      padding: 8px 12px; text-align: center; min-width: 50px; flex-shrink: 0;
    }
    .booking-day { font-family: var(--font-display); font-size: 1.4rem; color: #fff; line-height: 1; }
    .booking-mon { font-size: 10px; color: rgba(255,255,255,0.8); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    /* Confirm bar */
    .confirm-bar {
      position: sticky; bottom: 0; background: var(--dark);
      border-top: 1px solid var(--border); padding: 14px 20px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      margin: 0 -20px; z-index: 10;
    }
    @media (max-width: 600px) { .booking-row { flex-wrap: wrap; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">FIT<span>ANYA</span></a>
    <div id="sidebar-profile"></div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><span class="icon">🏠</span>Dashboard</a>
      <a href="/dashboard/schedule" class="nav-item active"><span class="icon">📅</span>Schedule</a>
      <a href="/dashboard/membership" class="nav-item"><span class="icon">🎫</span>Membership</a>
      <a href="/dashboard/payment" class="nav-item"><span class="icon">💳</span>Pay Now</a>
      <a href="/dashboard/progress" class="nav-item"><span class="icon">📊</span>Progress</a>
      <a href="/dashboard/diet" class="nav-item"><span class="icon">🥗</span>Diet & Nutrition</a>
      <a href="/dashboard/stories" class="nav-item"><span class="icon">📸</span>My Stories</a>
      <a href="/dashboard/referral" class="nav-item"><span class="icon">🎁</span>Refer & Earn</a>
      <a href="/dashboard/profile" class="nav-item"><span class="icon">👤</span>Profile</a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header flex-between mb-32">
      <div><h2>My Schedule</h2><p>Book, view and manage your training sessions</p></div>
      <div id="sessions-badge" class="badge badge-orange"></div>
    </div>

    <!-- Preferred slot panel (rendered by JS) -->
    <div id="preferred-panel" class="mb-16"></div>

    <!-- Book a session -->
    <div class="card mb-24">
      <div class="flex-between mb-16" style="flex-wrap:wrap;gap:10px">
        <div class="section-title" style="margin:0">Book a New Session</div>
        <button class="btn btn-dark btn-sm" onclick="toggleExpandAll()" id="expand-toggle-btn">Expand All ▼</button>
      </div>
      <div id="slots-wrap"><div class="spinner"></div></div>
    </div>

    <!-- Sticky confirm bar (shown when slot selected) -->
    <div id="book-confirm" class="confirm-bar hidden">
      <div style="flex:1;min-width:0">
        <div id="selected-slot-preview" style="font-size:14px;color:var(--white)"></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="confirmBook()">Confirm Booking →</button>
      <button class="btn btn-dark btn-sm" onclick="clearSelection()">✕ Cancel</button>
    </div>

    <!-- Upcoming bookings -->
    <div class="section-title">My Bookings</div>
    <div id="my-bookings"><div class="spinner"></div></div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  let membership    = null;
  let selectedSlot  = null;
  let allExpanded   = false;
  let _preferredTime = null;  // "HH:MM" or null
  let _allSlots      = [];    // last loaded slots

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    const data = await requireAuth();
    if (!data) return;
    window.__userTz = data.user?.timezone || 'Asia/Kolkata';
    membership = data.membership;
    _preferredTime = data.profile?.preferred_time || null;

    const rem = membership ? membership.sessions_total - membership.sessions_used : 0;
    document.getElementById('sessions-badge').textContent = rem + ' Sessions Remaining';

    renderPreferredPanel();
    loadSlots();
    loadMyBookings();
  }

  // ── Preferred slot panel ──────────────────────────────────────────────────
  function renderPreferredPanel() {
    const el = document.getElementById('preferred-panel');
    if (!_preferredTime) { el.innerHTML = ''; return; }

    el.innerHTML = `
      <div class="card" style="background:linear-gradient(135deg,rgba(255,92,0,0.08),rgba(255,92,0,0.03));border-color:rgba(255,92,0,0.3);margin-bottom:0">
        <div class="flex-between mb-12" style="flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-weight:700;color:var(--white);font-size:15px">⭐ Your Usual Slot — ${formatTime(_preferredTime)}</div>
            <div class="text-dim text-small">Next available sessions at your preferred time</div>
          </div>
          <button class="btn btn-dark btn-sm" onclick="clearPreferredTime()">✕ Clear</button>
        </div>
        <div id="pref-slots-wrap" class="slot-chips">
          <div class="spinner" style="width:20px;height:20px"></div>
        </div>
      </div>
    `;
  }

  function renderPreferredSlots(slots) {
    if (!_preferredTime) return;
    const el = document.getElementById('pref-slots-wrap');
    if (!el) return;

    const matched = slots.filter(s => s.start_time === _preferredTime);

    if (!matched.length) {
      el.innerHTML = '<p class="text-dim text-small" style="padding:4px 0">No upcoming slots at your preferred time. See all times below.</p>';
      return;
    }

    el.innerHTML = matched.map(s => {
      const localDate = new Date(`${s.date}T${s.start_time}:00+05:30`)
        .toLocaleDateString('en-US', { timeZone: window.__userTz, weekday: 'short', month: 'short', day: 'numeric' });
      const enc = JSON.stringify(s).replace(/"/g, '&quot;');
      return `<div class="slot-chip" id="pchip-${s.id}" onclick="selectSlot(${enc})" style="text-align:center">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:1px">${localDate}</div>
        <div>${formatSessionTime(s.start_time, s.date)}</div>
        <div class="slot-coach-tag">${s.coach_name}</div>
      </div>`;
    }).join('');
  }

  // ── Load all slots ────────────────────────────────────────────────────────
  async function loadSlots() {
    document.getElementById('slots-wrap').innerHTML = '<div class="spinner"></div>';
    clearSelection();

    const data = await api.get('/api/bookings/slots');
    _allSlots = data?.slots || [];

    if (!_allSlots.length) {
      document.getElementById('slots-wrap').innerHTML = '<p class="text-dim" style="padding:8px 0">No upcoming slots available yet. Check back soon.</p>';
      renderPreferredSlots([]);
      return;
    }

    renderPreferredSlots(_allSlots);

    // Group by member's local date
    const grouped = {};
    _allSlots.forEach(s => {
      const localDate = new Date(`${s.date}T${s.start_time}:00+05:30`)
        .toLocaleDateString('en-CA', { timeZone: window.__userTz });
      (grouped[localDate] = grouped[localDate] || []).push(s);
    });

    const entries = Object.entries(grouped).sort(([a], [b]) => a.localeCompare(b));
    document.getElementById('slots-wrap').innerHTML = entries.map(([d, slots], idx) => {
      const isOpen = idx === 0;
      const dateLabel = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'short' });
      const chips = slots.map(s => {
        const enc = JSON.stringify(s).replace(/"/g, '&quot;');
        return `<div class="slot-chip" id="chip-${s.id}" onclick="selectSlot(${enc})">
          ${formatSessionTime(s.start_time, s.date)}
          <div class="slot-coach-tag">${s.coach_name}</div>
        </div>`;
      }).join('');
      return `<div class="date-group" id="dg-${d}">
        <div class="date-group-header${isOpen ? ' open' : ''}" onclick="toggleGroup('${d}')">
          <span class="date-group-label">${dateLabel}</span>
          <div class="date-group-meta">
            <span class="date-slot-count">${slots.length} slot${slots.length !== 1 ? 's' : ''}</span>
            <span class="date-chevron${isOpen ? ' open' : ''}">▼</span>
          </div>
        </div>
        <div class="date-group-body${isOpen ? ' open' : ''}">
          <div class="slot-chips">${chips}</div>
        </div>
      </div>`;
    }).join('');
  }

  function toggleGroup(d) {
    const header = document.querySelector(`#dg-${d} .date-group-header`);
    const body   = document.querySelector(`#dg-${d} .date-group-body`);
    const chev   = document.querySelector(`#dg-${d} .date-chevron`);
    const opening = !body.classList.contains('open');
    header.classList.toggle('open', opening);
    body.classList.toggle('open', opening);
    chev.classList.toggle('open', opening);
  }

  function toggleExpandAll() {
    allExpanded = !allExpanded;
    document.querySelectorAll('.date-group-header').forEach(h => h.classList.toggle('open', allExpanded));
    document.querySelectorAll('.date-group-body').forEach(b => b.classList.toggle('open', allExpanded));
    document.querySelectorAll('.date-chevron').forEach(c => c.classList.toggle('open', allExpanded));
    document.getElementById('expand-toggle-btn').textContent = allExpanded ? 'Collapse All ▲' : 'Expand All ▼';
  }

  // ── Slot selection ────────────────────────────────────────────────────────
  function selectSlot(slot) {
    selectedSlot = slot;
    document.querySelectorAll('.slot-chip').forEach(el => el.classList.remove('selected'));
    document.getElementById('chip-'  + slot.id)?.classList.add('selected');
    document.getElementById('pchip-' + slot.id)?.classList.add('selected');
    document.getElementById('selected-slot-preview').innerHTML =
      `<strong>${formatSessionDate(slot.date, slot.start_time)}</strong> &nbsp;·&nbsp; ` +
      `${formatSessionTime(slot.start_time, slot.date)} – ${formatSessionTime(slot.end_time, slot.date)} &nbsp;·&nbsp; ` +
      `Coach: ${slot.coach_name} &nbsp;<span class="badge badge-orange" style="vertical-align:middle">1 hr</span>`;
    document.getElementById('book-confirm').classList.remove('hidden');
  }

  function clearSelection() {
    selectedSlot = null;
    document.getElementById('book-confirm').classList.add('hidden');
    document.querySelectorAll('.slot-chip').forEach(el => el.classList.remove('selected'));
  }

  // ── Book ──────────────────────────────────────────────────────────────────
  async function confirmBook() {
    if (!selectedSlot) return;
    if (!membership?.id) return toast('No active membership. Please renew.', 'error');

    const bookedTime = selectedSlot.start_time;
    const data = await api.post('/api/bookings/book', { slot_id: selectedSlot.id, membership_id: membership.id });
    if (data?.success) {
      toast('Session booked! 🎉 Check your email for Meet link.', 'success');
      // Nudge: track booking frequency per time in localStorage
      if (!_preferredTime) {
        const key = 'ftbook_' + bookedTime;
        const count = parseInt(localStorage.getItem(key) || '0') + 1;
        localStorage.setItem(key, count);
        if (count >= 2) setTimeout(() => showPreferenceNudge(bookedTime), 1200);
      }
      loadSlots();
      loadMyBookings();
    } else {
      toast(data?.error || 'Booking failed', 'error');
    }
  }

  // ── Preference nudge (appears after 2nd booking at same time) ─────────────
  function showPreferenceNudge(time) {
    if (document.getElementById('pref-nudge')) return;
    const nudge = document.createElement('div');
    nudge.id = 'pref-nudge';
    nudge.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;max-width:420px;width:calc(100% - 32px)';
    nudge.innerHTML = `
      <div class="card" style="background:var(--card);border-color:rgba(255,92,0,0.45);box-shadow:0 8px 32px rgba(0,0,0,0.5)">
        <div style="font-weight:700;color:var(--white);margin-bottom:4px">💡 Save your preferred time?</div>
        <div class="text-dim text-small mb-16">You often book <strong style="color:var(--white)">${formatTime(time)}</strong>. Save it to see available slots faster every time.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="savePreferredTime('${time}')">⭐ Yes, save it</button>
          <button class="btn btn-dark btn-sm" onclick="dismissNudge()">Not now</button>
        </div>
      </div>
    `;
    document.body.appendChild(nudge);
    setTimeout(() => nudge.remove(), 15000);
  }

  function dismissNudge() { document.getElementById('pref-nudge')?.remove(); }

  // ── Save / clear preferred time ───────────────────────────────────────────
  async function savePreferredTime(time) {
    const data = await api.put('/api/customer/preferred-slot', { preferred_time: time });
    if (data?.success) {
      _preferredTime = time;
      dismissNudge();
      toast('Preferred time saved! ⭐', 'success');
      renderPreferredPanel();
      renderPreferredSlots(_allSlots);
    } else {
      toast('Failed to save preference', 'error');
    }
  }

  async function clearPreferredTime() {
    const data = await api.put('/api/customer/preferred-slot', { preferred_time: null });
    if (data?.success) {
      _preferredTime = null;
      renderPreferredPanel();
      toast('Preferred time cleared', 'info');
    }
  }

  // ── My bookings ───────────────────────────────────────────────────────────
  async function loadMyBookings() {
    const data = await api.get('/api/bookings/my');
    const el = document.getElementById('my-bookings');
    if (!data?.bookings?.length) {
      el.innerHTML = '<div class="card"><p class="text-dim">No bookings yet.</p></div>'; return;
    }
    el.innerHTML = data.bookings.map(b => {
      const localDt  = new Date(`${b.date}T${b.start_time}:00+05:30`);
      const localDay = localDt.toLocaleString('en-US', { timeZone: window.__userTz, day: 'numeric' });
      const localMon = localDt.toLocaleString('en-US', { timeZone: window.__userTz, month: 'short' }).toUpperCase();
      const status   = b.is_completed ? 'badge-green' : b.status === 'cancelled' ? 'badge-red' : 'badge-orange';
      const label    = b.is_completed ? 'Completed' : b.status === 'cancelled' ? 'Cancelled' : 'Confirmed';
      return `
        <div class="booking-row">
          <div class="booking-date-box">
            <div class="booking-day">${localDay}</div>
            <div class="booking-mon">${localMon}</div>
          </div>
          <div style="flex:1">
            <div style="color:var(--white);font-weight:600">Session with ${b.coach_name}</div>
            <div class="text-dim text-small">${formatSessionDate(b.date, b.start_time)} · ${formatSessionTime(b.start_time, b.date)} – ${formatSessionTime(b.end_time, b.date)} ${tzLabel()}</div>
          </div>
          <span class="badge ${status}">${label}</span>
          ${!b.is_completed && b.status !== 'cancelled' && !isMeetExpired(b.date, b.start_time) ? `<a href="${meetUrl(b.meet_link, b.id)}" target="_blank" class="btn btn-primary btn-sm">Join Meet</a>` : ''}
          ${!b.is_completed && b.status !== 'cancelled' ? `<button class="btn btn-dark btn-sm" onclick="cancelBooking(${b.id})">Cancel</button>` : ''}
        </div>
      `;
    }).join('');
  }

  async function cancelBooking(id) {
    if (!confirm('Cancel this session? (24hr notice required)')) return;
    const data = await api.post('/api/bookings/cancel/' + id, { reason: 'Customer requested' });
    if (data?.success) { toast('Session cancelled', 'info'); loadMyBookings(); }
    else toast(data?.error || 'Cancellation failed', 'error');
  }

  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
