<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Settings — Fitanya Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
    <a href="/admin" class="sidebar-logo">FIT<span>ANYA</span></a>
    <div class="admin-profile">
      <div class="admin-avatar">A</div>
      <div class="admin-info">
        <div class="admin-name">Admin</div>
        <span class="admin-role-badge">Super Admin</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Overview</div>
      <a href="/admin" class="nav-item"><span class="icon">📊</span>Dashboard</a>
      <div class="nav-group-label">Management</div>
      <a href="/admin/members" class="nav-item"><span class="icon">👥</span>Members</a>
      <a href="/admin/coaches" class="nav-item"><span class="icon">🏋️</span>Coaches</a>
      <a href="/admin/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <div class="nav-group-label">Revenue</div>
      <a href="/admin/packages" class="nav-item"><span class="icon">📦</span>Packages</a>
      <a href="/admin/discounts" class="nav-item"><span class="icon">🏷️</span>Discounts</a>
      <div class="nav-group-label">Content</div>
      <a href="/admin/stories" class="nav-item"><span class="icon">📸</span>Stories</a>
      <a href="/admin/monthly-games" class="nav-item"><span class="icon">🏆</span>Monthly Games</a>
      <a href="/admin/diet" class="nav-item"><span class="icon">🥗</span>Diet Plans</a>
      <div class="nav-group-label">System</div>
      <a href="/admin/settings" class="nav-item active"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <div class="admin-topbar-title">Settings</div>
        <div class="breadcrumb">Fitanya Admin <span class="bc-sep">›</span> <span class="bc-current">System › Settings</span></div>
      </div>
    </div>
    <div class="card" style="max-width:540px">
      <div class="section-title">Referral Program</div>
      <div id="ref-form"><div class="spinner"></div></div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    const data = await api.get('/api/admin/referral-config');
    if (!data?.success) { window.location.href = '/login'; return; }
    const c = data.config;
    document.getElementById('ref-form').innerHTML = `
      <div class="form-group"><label>Reward Type</label>
        <select class="form-control" id="r-type"><option value="credit" ${c.reward_type==='credit'?'selected':''}>Account Credit (₹)</option></select>
      </div>
      <div class="form-group"><label>Reward Value (₹)</label><input class="form-control" type="number" id="r-value" value="${c.reward_value}" /></div>
      <div class="form-group"><label>Minimum Purchase Amount (₹)</label><input class="form-control" type="number" id="r-min" value="${c.min_purchase||0}" /></div>
      <div class="form-group"><label>Status</label>
        <select class="form-control" id="r-active"><option value="1" ${c.is_active?'selected':''}>Active</option><option value="0" ${!c.is_active?'selected':''}>Disabled</option></select>
      </div>
      <button class="btn btn-primary" onclick="saveConfig()">Save Settings</button>
    `;
  }

  async function saveConfig() {
    const data = await api.put('/api/admin/referral-config', {
      reward_type: document.getElementById('r-type').value,
      reward_value: parseFloat(document.getElementById('r-value').value),
      min_purchase: parseFloat(document.getElementById('r-min').value),
      is_active: parseInt(document.getElementById('r-active').value),
    });
    if (data?.success) toast('Settings saved!', 'success');
    else toast(data?.error || 'Failed', 'error');
  }

  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
