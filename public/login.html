<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Login — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); }
    .login-wrap { width: 100%; max-width: 440px; padding: 24px; }
    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .login-logo img { height: 72px; width: auto; background: #fff; border-radius: 16px; padding: 6px; }
    .login-logo-text { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 4px; color: var(--white); }
    .login-logo-text span { color: var(--orange); }
    .login-sub { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 40px; }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
    }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { color: var(--text-dim); font-size: 12px; }
    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,92,0,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,92,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="login-wrap">
    <div class="login-logo"><img src="/icons/logo.png" alt="Fitanya"><span class="login-logo-text">FIT<span>ANYA</span></span></div>
    <p class="login-sub">Transform Your Body. Transform Your Life.</p>

    <div class="login-card">
      <h3 style="font-family:var(--font-display);font-size:1.6rem;margin-bottom:28px">Welcome Back</h3>

      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>

      <div style="text-align:right;margin-top:6px;margin-bottom:2px">
        <a href="#" class="text-small text-dim" onclick="openForgot();return false" style="text-decoration:underline;color:var(--text-dim)">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full mt-8" onclick="doLogin()">Login to Fitanya →</button>

      <div class="divider"><span>OR</span></div>

      <p class="text-center text-small text-dim">
        New to Fitanya? <a href="/#packages" class="text-orange">Choose a Plan & Get Started</a>
      </p>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center">
    <div style="background:#111;border:1px solid #222;border-radius:16px;padding:36px;width:100%;max-width:400px;margin:24px;position:relative">
      <button onclick="closeForgot()" style="position:absolute;top:14px;right:18px;background:none;border:none;color:#666;font-size:22px;cursor:pointer">×</button>
      <h3 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:8px">Reset Password</h3>
      <p class="text-dim text-small mb-24">Enter your registered email and we'll send a new password.</p>
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" id="forgot-email" placeholder="you@email.com" />
      </div>
      <button class="btn btn-primary btn-full mt-8" id="forgot-btn" onclick="doForgot()">Send New Password</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    // If already logged in, redirect
    api.get('/api/customer/profile').then(data => {
      if (data?.success) {
        const role = data.user?.role;
        window.location.href = role === 'admin' ? '/admin' : role === 'coach' ? '/coach' : '/dashboard';
      }
    }).catch(() => {});

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return toast('Please enter email and password', 'error');

      const btn = document.querySelector('.btn-primary');
      btn.disabled = true; btn.textContent = 'Logging in...';

      // Use fetch directly — api.post redirects on 401 but login itself returns 401 for wrong password
      let data;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        data = await r.json();
      } catch {
        data = null;
      }
      btn.disabled = false; btn.textContent = 'Login to Fitanya →';

      if (data?.success) {
        toast('Welcome back! 🔥', 'success');
        setTimeout(() => window.location.href = data.redirect || '/dashboard', 500);
      } else {
        toast(data?.error || 'Invalid email or password', 'error');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function openForgot() {
      document.getElementById('forgot-modal').style.display = 'flex';
      document.getElementById('forgot-email').focus();
    }
    function closeForgot() {
      document.getElementById('forgot-modal').style.display = 'none';
      document.getElementById('forgot-email').value = '';
    }
    async function doForgot() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) return toast('Please enter your email', 'error');
      const btn = document.getElementById('forgot-btn');
      btn.disabled = true; btn.textContent = 'Sending...';
      const data = await api.post('/api/auth/forgot-password', { email });
      btn.disabled = false; btn.textContent = 'Send New Password';
      if (data?.success) {
        toast('If that email exists, a new password has been sent.', 'success');
        closeForgot();
      } else {
        toast(data?.error || 'Failed', 'error');
      }
    }
  </script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
