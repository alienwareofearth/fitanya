<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); }
    .login-wrap { width: 100%; max-width: 440px; padding: 24px; }
    .login-logo {
      font-family: var(--font-display);
      font-size: 2.8rem;
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--orange); }
    .login-sub { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 40px; }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
    }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { color: var(--text-dim); font-size: 12px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px; border-radius: 8px;
      background: #fff; color: #1f1f1f; font-size: 14px; font-weight: 600;
      border: 1px solid #ddd; cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f5f5f5; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,92,0,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,92,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="login-wrap">
    <div class="login-logo">FIT<span>ANYA</span></div>
    <p class="login-sub">Transform Your Body. Transform Your Life.</p>

    <div class="login-card">
      <h3 style="font-family:var(--font-display);font-size:1.6rem;margin-bottom:28px">Welcome Back</h3>

      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>

      <div style="text-align:right;margin-top:6px;margin-bottom:2px">
        <a href="#" class="text-small text-dim" onclick="openForgot();return false" style="text-decoration:underline;color:var(--text-dim)">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full mt-8" onclick="doLogin()">Login to Fitanya →</button>

      <div class="divider"><span>OR</span></div>

      <a href="/api/auth/google" class="btn-google">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </a>

      <p class="text-center text-small text-dim mt-16">
        New to Fitanya? <a href="/#packages" class="text-orange">Choose a Plan & Get Started</a>
      </p>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center">
    <div style="background:#111;border:1px solid #222;border-radius:16px;padding:36px;width:100%;max-width:400px;margin:24px;position:relative">
      <button onclick="closeForgot()" style="position:absolute;top:14px;right:18px;background:none;border:none;color:#666;font-size:22px;cursor:pointer">×</button>
      <h3 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:8px">Reset Password</h3>
      <p class="text-dim text-small mb-24">Enter your registered email and we'll send a new password.</p>
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" id="forgot-email" placeholder="you@email.com" />
      </div>
      <button class="btn btn-primary btn-full mt-8" id="forgot-btn" onclick="doForgot()">Send New Password</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    // Show Google OAuth errors from redirect params
    const urlErr = new URLSearchParams(window.location.search).get('error');
    if (urlErr) {
      const msgs = { google_denied: 'Google sign-in was cancelled.', google_failed: 'Google sign-in failed. Please try again.', no_email: 'Could not retrieve email from Google.', google_not_configured: 'Google login is not configured yet.' };
      toast(msgs[urlErr] || 'Sign-in error.', 'error');
    }

    // If already logged in, redirect
    api.get('/api/customer/profile').then(data => {
      if (data?.success) {
        const role = data.user?.role;
        window.location.href = role === 'admin' ? '/admin' : role === 'coach' ? '/coach' : '/dashboard';
      }
    }).catch(() => {});

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return toast('Please enter email and password', 'error');

      const btn = document.querySelector('.btn-primary');
      btn.disabled = true; btn.textContent = 'Logging in...';

      const data = await api.post('/api/auth/login', { email, password });
      btn.disabled = false; btn.textContent = 'Login to Fitanya →';

      if (data?.success) {
        toast('Welcome back! 🔥', 'success');
        setTimeout(() => window.location.href = data.redirect || '/dashboard', 500);
      } else {
        toast(data?.error || 'Login failed', 'error');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function openForgot() {
      document.getElementById('forgot-modal').style.display = 'flex';
      document.getElementById('forgot-email').focus();
    }
    function closeForgot() {
      document.getElementById('forgot-modal').style.display = 'none';
      document.getElementById('forgot-email').value = '';
    }
    async function doForgot() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) return toast('Please enter your email', 'error');
      const btn = document.getElementById('forgot-btn');
      btn.disabled = true; btn.textContent = 'Sending...';
      const data = await api.post('/api/auth/forgot-password', { email });
      btn.disabled = false; btn.textContent = 'Send New Password';
      if (data?.success) {
        toast('If that email exists, a new password has been sent.', 'success');
        closeForgot();
      } else {
        toast(data?.error || 'Failed', 'error');
      }
    }
  </script>
</body>
</html>
