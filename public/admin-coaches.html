<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaches — Fitaniya Admin</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/admin" class="sidebar-logo" style="font-size:20px;padding:22px 20px">FIT<span>ANIYA</span></a>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item"><span class="icon">📊</span>Dashboard</a>
      <a href="/admin/packages" class="nav-item"><span class="icon">📦</span>Packages & Prices</a>
      <a href="/admin/discounts" class="nav-item"><span class="icon">🏷️</span>Discounts</a>
      <a href="/admin/coaches" class="nav-item active"><span class="icon">🏋️</span>Coaches</a>
      <a href="/admin/members" class="nav-item"><span class="icon">👥</span>Members</a>
      <a href="/admin/stories" class="nav-item"><span class="icon">📸</span>Stories</a>
      <a href="/admin/diet" class="nav-item"><span class="icon">🥗</span>Diet Plans</a>
      <a href="/admin/settings" class="nav-item"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header flex-between mb-32">
      <div><h2>Coaches</h2><p>Add and manage training coaches. Default password: Fitaniya@123</p></div>
      <button class="btn btn-primary" onclick="document.getElementById('add-modal').classList.remove('hidden')">+ Add Coach</button>
    </div>
    <div id="coaches-wrap"><div class="spinner"></div></div>
  </main>
</div>

<div class="modal-overlay hidden" id="add-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('add-modal').classList.add('hidden')">×</button>
    <h3 class="modal-title">Add New Coach</h3>
    <p class="text-dim mt-4 mb-24">Coach will receive default password: <strong class="text-orange">Fitaniya@123</strong></p>
    <div class="form-group"><label>Full Name *</label><input class="form-control" id="c-name" /></div>
    <div class="form-group"><label>Email *</label><input class="form-control" type="email" id="c-email" /></div>
    <div class="form-group"><label>Phone</label><input class="form-control" id="c-phone" /></div>
    <div class="form-group"><label>Bio</label><textarea class="form-control" id="c-bio" rows="2"></textarea></div>
    <div class="form-group"><label>Specializations</label><input class="form-control" id="c-spec" placeholder="e.g. Fat Loss, HIIT, Strength Training" /></div>
    <div class="form-group"><label>Certifications</label><input class="form-control" id="c-cert" placeholder="e.g. ACSM, NSCA, ACE" /></div>
    <button class="btn btn-primary btn-full" onclick="addCoach()">Add Coach</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    const data = await api.get('/api/admin/coaches');
    if (!data?.success) { window.location.href = '/login'; return; }
    const el = document.getElementById('coaches-wrap');
    if (!data.coaches?.length) { el.innerHTML = '<div class="card"><p class="text-dim">No coaches yet.</p></div>'; return; }
    el.innerHTML = `<div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Specializations</th><th>Status</th></tr></thead>
      <tbody>
        ${data.coaches.map(c => `<tr>
          <td style="font-weight:600;color:var(--white)">${c.name}</td>
          <td class="text-dim">${c.email}</td>
          <td class="text-dim">${c.phone||'—'}</td>
          <td class="text-dim">${c.specializations||'—'}</td>
          <td><span class="badge ${c.is_active?'badge-green':'badge-red'}">${c.is_active?'Active':'Inactive'}</span></td>
        </tr>`).join('')}
      </tbody>
    </table></div></div>`;
  }

  async function addCoach() {
    const payload = {
      name: document.getElementById('c-name').value,
      email: document.getElementById('c-email').value,
      phone: document.getElementById('c-phone').value,
      bio: document.getElementById('c-bio').value,
      specializations: document.getElementById('c-spec').value,
      certifications: document.getElementById('c-cert').value,
    };
    if (!payload.name || !payload.email) return toast('Name and email required', 'error');
    const data = await api.post('/api/admin/coaches', payload);
    if (data?.success) {
      toast('Coach added! Password: Fitaniya@123', 'success');
      document.getElementById('add-modal').classList.add('hidden');
      init();
    } else toast(data?.error || 'Failed', 'error');
  }

  init();
</script>
</body>
</html>
