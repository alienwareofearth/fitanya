<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Membership — Fitanya</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-logo">FIT<span>ANYA</span></a>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item"><span class="icon">🏠</span>Dashboard</a>
      <a href="/dashboard/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <a href="/dashboard/membership" class="nav-item active"><span class="icon">🎫</span>Membership</a>
      <a href="/dashboard/progress" class="nav-item"><span class="icon">📊</span>Progress</a>
      <a href="/dashboard/diet" class="nav-item"><span class="icon">🥗</span>Diet & Nutrition</a>
      <a href="/dashboard/stories" class="nav-item"><span class="icon">📸</span>My Stories</a>
      <a href="/dashboard/referral" class="nav-item"><span class="icon">🎁</span>Refer & Earn</a>
      <a href="/dashboard/profile" class="nav-item"><span class="icon">👤</span>Profile</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header mb-32">
      <h2>Membership</h2>
      <p>Manage your plans, view payment history, and renew your membership</p>
    </div>

    <!-- Active membership -->
    <div id="active-membership"><div class="spinner"></div></div>

    <!-- Payment history -->
    <div class="section-title mt-32">Payment History</div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Package</th><th>Amount</th><th>Discount</th><th>Credits</th><th>Status</th><th>Txn ID</th></tr></thead>
          <tbody id="payment-rows"><tr><td colspan="7" class="text-center text-dim">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Renew section -->
    <div class="section-title mt-32">Renew or Upgrade</div>
    <div class="packages-grid" id="renew-packages" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:16px"></div>
  </main>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function init() {
    await requireAuth();
    const data = await api.get('/api/customer/membership');
    if (!data?.success) return;

    // Active membership card
    const mem = data.memberships?.find(m => m.status === 'active');
    const el = document.getElementById('active-membership');
    if (mem) {
      const used = mem.sessions_used, total = mem.sessions_total;
      const pct = Math.round((used / total) * 100);
      const daysLeft = Math.ceil((new Date(mem.end_date) - Date.now()) / 86400000);
      el.innerHTML = `
        <div class="card card-glow">
          <div class="flex-between mb-24">
            <div>
              <div style="font-family:var(--font-display);font-size:1.8rem;color:var(--white)">${mem.package_name}</div>
              <div class="text-dim text-small">Coach: ${mem.coach_name || 'Being assigned...'}</div>
            </div>
            <span class="badge badge-green">Active</span>
          </div>
          <div class="grid-3 gap-16 mb-24">
            <div class="stat-card"><div class="stat-label">Sessions Done</div><div class="stat-value">${used}</div></div>
            <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-value orange">${total - used}</div></div>
            <div class="stat-card"><div class="stat-label">Days Left</div><div class="stat-value">${Math.max(0, daysLeft)}</div></div>
          </div>
          <div class="stat-label mb-8">Session Progress (${used}/${total})</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="flex-between mt-8">
            <span class="text-small text-dim">Expires: ${formatDate(mem.end_date)}</span>
            <span class="text-small text-orange">${pct}% used</span>
          </div>
        </div>
      `;
    } else {
      el.innerHTML = `<div class="card text-center" style="padding:40px">
        <p class="text-dim mb-16">No active membership. Choose a plan to get started!</p>
        <a href="/#packages" class="btn btn-primary">Browse Plans</a>
      </div>`;
    }

    // Payments table
    const tbody = document.getElementById('payment-rows');
    if (!data.payments?.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-dim">No payments yet</td></tr>';
    } else {
      tbody.innerHTML = data.payments.map(p => `
        <tr>
          <td>${formatDate(p.created_at)}</td>
          <td>—</td>
          <td>₹${p.amount.toLocaleString('en-IN')}</td>
          <td class="text-green">${p.discount_amount > 0 ? '-₹' + p.discount_amount : '—'}</td>
          <td class="text-green">${p.credits_used > 0 ? '-₹' + p.credits_used : '—'}</td>
          <td><span class="badge ${p.status === 'completed' ? 'badge-green' : 'badge-yellow'}">${p.status}</span></td>
          <td class="text-dim text-small">${p.transaction_id || '—'}</td>
        </tr>
      `).join('');
    }

    // Renew packages
    const pkgs = await api.get('/api/public/packages');
    if (pkgs?.packages) {
      document.getElementById('renew-packages').innerHTML = pkgs.packages.map(p => `
        <div class="card">
          <div style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:8px">${p.name}</div>
          <div style="font-family:var(--font-display);font-size:2rem;color:var(--orange);margin-bottom:12px">₹${p.price.toLocaleString('en-IN')}</div>
          <p class="text-dim text-small mb-16">${p.sessions} Sessions · ${p.days} Days</p>
          <a href="/#packages" class="btn btn-outline btn-sm btn-full">Renew →</a>
        </div>
      `).join('');
    }
  }
  init();
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
