<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitanya">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Stories Approval — Fitanya Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
    <a href="/admin" class="sidebar-logo">FIT<span>ANYA</span></a>
    <div class="admin-profile">
      <div class="admin-avatar">A</div>
      <div class="admin-info">
        <div class="admin-name">Admin</div>
        <span class="admin-role-badge">Super Admin</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Overview</div>
      <a href="/admin" class="nav-item"><span class="icon">📊</span>Dashboard</a>
      <div class="nav-group-label">Management</div>
      <a href="/admin/members" class="nav-item"><span class="icon">👥</span>Members</a>
      <a href="/admin/coaches" class="nav-item"><span class="icon">🏋️</span>Coaches</a>
      <a href="/admin/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <div class="nav-group-label">Revenue</div>
      <a href="/admin/packages" class="nav-item"><span class="icon">📦</span>Packages</a>
      <a href="/admin/discounts" class="nav-item"><span class="icon">🏷️</span>Discounts</a>
      <div class="nav-group-label">Content</div>
      <a href="/admin/stories" class="nav-item active"><span class="icon">📸</span>Stories</a>
      <a href="/admin/diet" class="nav-item"><span class="icon">🥗</span>Diet Plans</a>
      <div class="nav-group-label">System</div>
      <a href="/admin/settings" class="nav-item"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <div class="admin-topbar-title">Stories Approval</div>
        <div class="breadcrumb">Fitanya Admin <span class="bc-sep">›</span> <span class="bc-current">Content › Stories Approval</span></div>
      </div>
    </div>
    <div class="flex gap-12 mb-24">
      <button class="btn btn-primary btn-sm" onclick="loadStories('pending')">Pending</button>
      <button class="btn btn-dark btn-sm" onclick="loadStories('approved')">Approved</button>
      <button class="btn btn-dark btn-sm" onclick="loadStories('rejected')">Rejected</button>
    </div>
    <div id="stories-wrap"><div class="spinner"></div></div>
  </main>
</div>

<!-- Review Modal -->
<div class="modal-overlay hidden" id="review-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('review-modal').classList.add('hidden')">×</button>
    <h3 class="modal-title" id="review-title">Review Story</h3>
    <input type="hidden" id="review-story-id" />
    <div id="review-preview" class="mb-24"></div>
    <div class="form-group"><label>Admin Note (optional)</label><textarea class="form-control" id="review-note" rows="2" placeholder="Reason for rejection or feedback..."></textarea></div>
    <div class="flex gap-12">
      <button class="btn btn-primary" style="flex:1" onclick="doReview('approved')">✅ Approve</button>
      <button class="btn btn-dark" style="flex:1;border-color:var(--red);color:var(--red)" onclick="doReview('rejected')">❌ Reject</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function loadStories(status = 'pending') {
    const data = await api.get('/api/admin/stories?status=' + status);
    if (!data?.success) { window.location.href = '/login'; return; }
    const el = document.getElementById('stories-wrap');
    if (!data.stories?.length) { el.innerHTML = `<div class="card"><p class="text-dim">No ${status} stories.</p></div>`; return; }
    el.innerHTML = data.stories.map(s => `
      <div class="card mb-24">
        <div class="flex-between mb-16">
          <div><strong class="text-white">${s.user_name}</strong><br><span class="text-dim text-small">${formatDate(s.created_at)}</span></div>
          <div class="flex gap-8">
            <span class="badge ${s.status==='approved'?'badge-green':s.status==='rejected'?'badge-red':'badge-yellow'}">${s.status}</span>
            ${status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="openReview(${s.id}, '${s.user_name}', ${JSON.stringify(s.body).replace(/"/g,'&quot;')}, '${s.photo_url||''}')">Review</button>` : ''}
          </div>
        </div>
        ${s.photo_url ? `<img src="${s.photo_url}" style="width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:12px" />` : ''}
        ${s.title ? `<h4 style="margin-bottom:8px">${s.title}</h4>` : ''}
        <p style="color:var(--text);font-size:14px">${s.body}</p>
        ${s.admin_note ? `<div class="card mt-12" style="background:var(--dark)"><span class="text-dim text-small">Note: </span>${s.admin_note}</div>` : ''}
      </div>
    `).join('');
  }

  function openReview(id, name, body, photo) {
    document.getElementById('review-story-id').value = id;
    document.getElementById('review-title').textContent = 'Review Story by ' + name;
    document.getElementById('review-preview').innerHTML = `
      ${photo ? `<img src="${photo}" style="width:100%;max-height:180px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:12px" />` : ''}
      <p style="font-size:14px;color:var(--text)">${body}</p>
    `;
    document.getElementById('review-note').value = '';
    document.getElementById('review-modal').classList.remove('hidden');
  }

  async function doReview(status) {
    const id = document.getElementById('review-story-id').value;
    const admin_note = document.getElementById('review-note').value;
    const data = await api.post('/api/admin/stories/' + id + '/review', { status, admin_note });
    if (data?.success) {
      toast(status === 'approved' ? 'Story approved! 🎉' : 'Story rejected', status === 'approved' ? 'success' : 'info');
      document.getElementById('review-modal').classList.add('hidden');
      loadStories('pending');
    } else toast(data?.error || 'Failed', 'error');
  }

  loadStories('pending');
</script>
<script src="/js/pwa.js" defer></script>
</body>
</html>
