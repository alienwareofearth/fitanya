<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members — Fitanya Admin</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="/admin" class="sidebar-logo" style="font-size:20px;padding:22px 20px">FIT<span>ANYA</span></a>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item"><span class="icon">📊</span>Dashboard</a>
      <a href="/admin/packages" class="nav-item"><span class="icon">📦</span>Packages & Prices</a>
      <a href="/admin/discounts" class="nav-item"><span class="icon">🏷️</span>Discounts</a>
      <a href="/admin/coaches" class="nav-item"><span class="icon">🏋️</span>Coaches</a>
      <a href="/admin/members" class="nav-item active"><span class="icon">👥</span>Members</a>
      <a href="/admin/schedule" class="nav-item"><span class="icon">📅</span>Schedule</a>
      <a href="/admin/stories" class="nav-item"><span class="icon">📸</span>Stories</a>
      <a href="/admin/diet" class="nav-item"><span class="icon">🥗</span>Diet Plans</a>
      <a href="/admin/settings" class="nav-item"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="icon">🚪</span>Logout</button></div>
  </aside>
  <main class="main-content">
    <div class="page-header mb-32"><h2>Members</h2><p>View all members, their progress and coach assignments</p></div>
    <div class="card mb-16">
      <input class="form-control" id="search" placeholder="🔍 Search by name or email..." oninput="filterMembers()" style="max-width:320px" />
    </div>
    <div id="members-wrap"><div class="spinner"></div></div>
  </main>
</div>

<!-- Add Sessions Modal -->
<div class="modal-overlay hidden" id="sessions-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('sessions-modal').classList.add('hidden')">×</button>
    <h3 class="modal-title">Add Sessions</h3>
    <p class="text-dim mt-4 mb-24">Member: <strong class="text-white" id="sessions-member-name"></strong></p>
    <p class="text-dim mb-16">Current: <strong class="text-white" id="sessions-current"></strong></p>
    <input type="hidden" id="sessions-member-id" />
    <div class="form-group">
      <label>Sessions to Add</label>
      <input class="form-control" type="number" id="sessions-to-add" min="1" placeholder="e.g. 4" />
    </div>
    <button class="btn btn-primary btn-full" onclick="doAddSessions()">Add Sessions</button>
  </div>
</div>

<!-- Reassign Coach Modal -->
<div class="modal-overlay hidden" id="reassign-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('reassign-modal').classList.add('hidden')">×</button>
    <h3 class="modal-title">Assign Coach</h3>
    <p class="text-dim mt-4 mb-24">Member: <strong class="text-white" id="reassign-member-name"></strong></p>
    <input type="hidden" id="reassign-member-id" />
    <div class="form-group">
      <label>Select Coach</label>
      <select class="form-control" id="reassign-coach-id"></select>
    </div>
    <button class="btn btn-primary btn-full" onclick="doReassign()">Save Assignment</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  let allMembers = [], allCoaches = [];

  async function init() {
    const [membersData, coachesData] = await Promise.all([
      api.get('/api/admin/members'),
      api.get('/api/admin/coaches'),
    ]);
    if (!membersData?.success) { window.location.href = '/login'; return; }
    allMembers = membersData.members || [];
    allCoaches = coachesData?.coaches || [];
    renderMembers(allMembers);
  }

  function renderMembers(members) {
    const el = document.getElementById('members-wrap');
    if (!members.length) { el.innerHTML = '<div class="card"><p class="text-dim">No members found.</p></div>'; return; }
    el.innerHTML = `<div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Fitness Goal</th><th>Package</th><th>Coach</th><th>Sessions</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${members.map(m => `<tr>
          <td style="font-weight:600;color:var(--white)">${m.name}</td>
          <td class="text-dim">${m.email}</td>
          <td>${m.fitness_goal || '<span class="text-dim">—</span>'}</td>
          <td>${m.package_name || '—'}</td>
          <td id="coach-cell-${m.id}">${m.coach_name || '<span class="text-dim">Unassigned</span>'}</td>
          <td>${m.sessions_used != null ? m.sessions_used + '/' + m.sessions_total : '—'}</td>
          <td><span class="badge ${m.membership_status === 'active' ? 'badge-green' : 'badge-yellow'}">${m.membership_status || 'no plan'}</span></td>
          <td><div class="flex gap-8">
            ${m.membership_status === 'active'
              ? `<button class="btn btn-dark btn-sm" onclick="openAddSessions(${m.id},'${m.name.replace(/'/g,"\\'")}',${m.sessions_used||0},${m.sessions_total||0})">+ Sessions</button>`
              : `<button class="btn btn-dark btn-sm" onclick="assignTrial(${m.id}, this)">Give Trial</button>`}
            <button class="btn btn-dark btn-sm" onclick="openReassign(${m.id},'${m.name.replace(/'/g,"\\'")}','${m.coach_id||''}')">Assign Coach</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table></div></div>`;
  }

  function filterMembers() {
    const q = document.getElementById('search').value.toLowerCase();
    renderMembers(allMembers.filter(m => m.name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q)));
  }

  async function assignTrial(memberId, btn) {
    btn.disabled = true; btn.textContent = 'Assigning...';
    try {
      const data = await api.post('/api/admin/members/' + memberId + '/assign-trial', {});
      if (data?.success) { toast('Trial membership assigned!', 'success'); init(); }
      else toast(data?.error || 'Failed', 'error');
    } finally { btn.disabled = false; btn.textContent = 'Give Trial'; }
  }

  function openAddSessions(memberId, memberName, used, total) {
    document.getElementById('sessions-member-id').value = memberId;
    document.getElementById('sessions-member-name').textContent = memberName;
    document.getElementById('sessions-current').textContent = used + ' used / ' + total + ' total';
    document.getElementById('sessions-to-add').value = '';
    document.getElementById('sessions-modal').classList.remove('hidden');
  }

  async function doAddSessions() {
    const memberId = document.getElementById('sessions-member-id').value;
    const toAdd = document.getElementById('sessions-to-add').value;
    if (!toAdd || parseInt(toAdd) < 1) return toast('Enter a valid number', 'error');
    const btn = event.target;
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      const data = await api.post('/api/admin/members/' + memberId + '/add-sessions', { sessions_to_add: parseInt(toAdd) });
      if (data?.success) {
        toast('Sessions added!', 'success');
        document.getElementById('sessions-modal').classList.add('hidden');
        init();
      } else toast(data?.error || 'Failed', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Add Sessions';
    }
  }

  function openReassign(memberId, memberName, currentCoachId) {
    document.getElementById('reassign-member-id').value = memberId;
    document.getElementById('reassign-member-name').textContent = memberName;
    const sel = document.getElementById('reassign-coach-id');
    sel.innerHTML = allCoaches.filter(c => c.is_active).map(c =>
      `<option value="${c.id}" ${String(c.id) === String(currentCoachId) ? 'selected' : ''}>${c.name}</option>`
    ).join('');
    document.getElementById('reassign-modal').classList.remove('hidden');
  }

  async function doReassign() {
    const memberId = document.getElementById('reassign-member-id').value;
    const coachId = document.getElementById('reassign-coach-id').value;
    const btn = event.target;
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      const data = await api.post('/api/admin/members/' + memberId + '/reassign-coach', { coach_id: coachId });
      if (data?.success) {
        toast('Coach assigned!', 'success');
        document.getElementById('reassign-modal').classList.add('hidden');
        init();
      } else toast(data?.error || 'Failed', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Save Assignment';
    }
  }

  init();
</script>
</body>
</html>
