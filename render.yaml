services:
  - type: web
    name: fitanya
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/public/packages
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@fitanya.com
      - key: EMAIL_FROM_NAME
        value: Fitanya
      - key: PHONEPE_MERCHANT_ID
        sync: false
      - key: PHONEPE_SALT_KEY
        sync: false
      - key: PHONEPE_SALT_INDEX
        value: "1"
      - key: PHONEPE_ENV
        value: PROD
      - key: PHONEPE_BASE_URL
        value: https://api.phonepe.com/apis/hermes
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: APP_URL
        sync: false
      - key: APP_NAME
        value: Fitanya
      - key: SMS_GATEWAY_URL
        sync: false
      - key: SMS_GATEWAY_TOKEN
        sync: false
